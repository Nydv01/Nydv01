<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 350" width="830" height="350">
  <defs>
    <!-- Background and Window Colors -->
    <linearGradient id="windowBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d111d" />
      <stop offset="100%" stop-color="#07090e" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="terminalGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&amp;display=swap');

    .term-window {
      stroke: #00f0ff;
      stroke-width: 1.5;
      stroke-opacity: 0.25;
      fill: url(#windowBg);
      filter: drop-shadow(0px 10px 30px rgba(0,0,0,0.7));
    }

    .header-bar {
      fill: #151b2c;
      stroke: #00f0ff;
      stroke-width: 1;
      stroke-opacity: 0.15;
    }

    .term-title {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #6b7c96;
      text-anchor: middle;
    }

    .text-line {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      fill: #e2e8f0;
      opacity: 0;
    }

    /* Commands/Prompts styling */
    .prompt-symbol { fill: #bf55ec; font-weight: bold; }
    .prompt-user { fill: #00ff66; }
    .prompt-host { fill: #6b7c96; }
    .prompt-cmd { fill: #00f0ff; }
    
    /* Category Labels */
    .cat-label { fill: #00f0ff; font-weight: bold; }
    .cat-val { fill: #e2e8f0; }
    .cursor-blink {
      fill: #00f0ff;
    }

    /* Animation Timing */
    .delay-0 { animation: fadeInLine 0.5s ease forwards; animation-delay: 0.2s; }
    .delay-1 { animation: fadeInLine 0.5s ease forwards; animation-delay: 1.0s; }
    .delay-2 { animation: fadeInLine 0.5s ease forwards; animation-delay: 1.8s; }
    .delay-3 { animation: fadeInLine 0.5s ease forwards; animation-delay: 2.6s; }
    .delay-4 { animation: fadeInLine 0.5s ease forwards; animation-delay: 3.4s; }
    .delay-5 { animation: fadeInLine 0.5s ease forwards; animation-delay: 4.2s; }
    .delay-6 { animation: fadeInLine 0.5s ease forwards; animation-delay: 5.0s; }
    .delay-7 { animation: fadeInLine 0.5s ease forwards; animation-delay: 5.8s; }

    @keyframes fadeInLine {
      to { opacity: 1; }
    }

    /* Progress Bar Animation */
    .progress-fill {
      fill: none;
      stroke: #bf55ec;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: drawProgress 1s ease forwards;
      animation-delay: 2.0s;
    }

    @keyframes drawProgress {
      to { stroke-dashoffset: 0; }
    }

    /* Cursor Blinking Animation */
    .cursor {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>

  <!-- Terminal Window Background -->
  <rect class="term-window" x="15" y="15" width="800" height="320" rx="8" />

  <!-- Terminal Header Bar -->
  <path class="header-bar" d="M 15 23 A 8 8 0 0 1 23 15 L 807 15 A 8 8 0 0 1 815 23 L 815 45 L 15 45 Z" />

  <!-- Window controls -->
  <circle cx="35" cy="30" r="6" fill="#ff5f56" />
  <circle cx="55" cy="30" r="6" fill="#ffbd2e" />
  <circle cx="75" cy="30" r="6" fill="#27c93f" />

  <!-- Window Title -->
  <text x="415" y="34" class="term-title">nitin@nydv01: ~/portfolio/skills</text>

  <!-- Terminal Content Lines -->
  
  <!-- Line 0: Command Trigger -->
  <text x="35" y="80" class="text-line delay-0">
    <tspan class="prompt-user">nitin</tspan><tspan class="prompt-host">@nydv01</tspan>:<tspan class="prompt-symbol">~$</tspan> <tspan class="prompt-cmd">./list_skills.sh --verbose</tspan>
  </text>

  <!-- Line 1: Loading Output -->
  <text x="35" y="110" class="text-line delay-1">
    <tspan fill="#6b7c96">Initializing skills scanner...</tspan>
  </text>

  <!-- Line 2: Progress bar representation -->
  <g class="text-line delay-2">
    <text x="35" y="135" fill="#6b7c96">Scanning environment:</text>
    <!-- Progress Bar Track -->
    <rect x="210" y="125" width="200" height="8" rx="4" fill="#1e293b" />
    <!-- Progress Bar Fill -->
    <line x1="214" y1="129" x2="406" y2="129" class="progress-fill" />
    <text x="425" y="135" fill="#00ff66" font-weight="bold">COMPLETE</text>
  </g>

  <!-- Line 3: Languages -->
  <text x="35" y="175" class="text-line delay-3">
    <tspan class="cat-label">Languages:      </tspan>
    <tspan class="cat-val">[ C++, Python, JavaScript, TypeScript, SQL, Java ]</tspan>
  </text>

  <!-- Line 4: Frontend -->
  <text x="35" y="205" class="text-line delay-4">
    <tspan class="cat-label">Frontend:       </tspan>
    <tspan class="cat-val">[ React.js, Next.js, Tailwind CSS, Framer Motion, Three.js, GSAP ]</tspan>
  </text>

  <!-- Line 5: Backend & DB -->
  <text x="35" y="235" class="text-line delay-5">
    <tspan class="cat-label">Backend &amp; DB:   </tspan>
    <tspan class="cat-val">[ FastAPI, Node.js, Express.js, Django, PostgreSQL, MongoDB, Redis ]</tspan>
  </text>

  <!-- Line 6: AI/ML & DevOps -->
  <text x="35" y="265" class="text-line delay-6">
    <tspan class="cat-label">AI/ML &amp; Cyber:  </tspan>
    <tspan class="cat-val">[ OpenAI, scikit-learn, LangChain, RAG, OWASP Top 10, JWT, Docker, Git ]</tspan>
  </text>

  <!-- Line 7: Blinking cursor at next input prompt -->
  <text x="35" y="300" class="text-line delay-7">
    <tspan class="prompt-user">nitin</tspan><tspan class="prompt-host">@nydv01</tspan>:<tspan class="prompt-symbol">~$</tspan> <tspan class="prompt-cmd">_</tspan>
  </text>
  
  <rect class="cursor text-line delay-7" x="180" y="287" width="8" height="15" fill="#00f0ff" />
</svg>
