<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 420" width="830" height="420">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="dbBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c" />
      <stop offset="100%" stop-color="#020203" />
    </linearGradient>

    <!-- Elevated Panel Color -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>

    <!-- Frosted Border Gradient -->
    <linearGradient id="frostBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#242426" />
    </linearGradient>

    <!-- Soft Shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&amp;family=SF+Pro+Text&amp;display=swap');

    .board-bg {
      fill: url(#dbBg);
    }

    .column-border {
      stroke: url(#frostBorder);
      stroke-width: 1;
      fill: url(#panelGrad);
      filter: url(#softShadow);
    }

    .header-text {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-anchor: middle;
      fill: #ffffff;
    }

    .label-gold { fill: #c5a880; }

    .tech-item {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 11px;
      fill: #e5e7eb;
    }

    .tech-category {
      font-family: 'Outfit', sans-serif;
      font-size: 8px;
      font-weight: 700;
      fill: #8e8e83;
      letter-spacing: 1px;
    }

    .progress-bar-fill {
      fill: #c5a880;
      animation: fillProgress 4s ease-in-out infinite alternate;
    }

    @keyframes fillProgress {
      0% { width: 10px; }
      100% { width: 120px; }
    }
  </style>

  <!-- Frame Background -->
  <rect class="board-bg" width="100%" height="100%" rx="16" />

  <!-- Title -->
  <text x="415" y="32" font-family="'Outfit', sans-serif" font-size="10" fill="#8e8e93" letter-spacing="3" text-anchor="middle">NITIN_YADAV: SYSTEMS_COCKPIT_v3.1</text>

  <!-- COLUMN 1: AI / COGNITIVE SYSTEM (Left) -->
  <g transform="translate(35, 55)">
    <rect class="column-border" x="0" y="0" width="240" height="330" rx="12" />
    <line x1="0" y1="30" x2="240" y2="30" stroke="#3a3a3c" stroke-width="1" />
    <text x="120" y="19" class="header-text label-gold">COGNITIVE_AI_CORE</text>

    <!-- AI Skill Details -->
    <g transform="translate(20, 55)">
      <text y="0" class="tech-category">INTELLIGENCE_MODELS</text>
      <text y="18" class="tech-item">• Generative AI: GPT-4o, Claude</text>
      <text y="34" class="tech-item">• scikit-learn Algorithms</text>
      <text y="50" class="tech-item">• Reinforcement (Q-Learning RL)</text>
      
      <text y="80" class="tech-category">DATA_PIPELINES</text>
      <text y="98" class="tech-item">• LangChain Framework</text>
      <text y="114" class="tech-item">• Retrieval-Augmented Gen (RAG)</text>
      
      <!-- Live compilation simulator -->
      <text y="145" class="tech-category">OPTIMIZATION_ENGINE</text>
      <text y="162" class="tech-item">Training Epoch: 94%</text>
      <rect x="0" y="170" width="150" height="4" rx="2" fill="#2c2c2e" />
      <rect class="progress-bar-fill" x="0" y="170" width="110" height="4" rx="2" />
    </g>
  </g>

  <!-- COLUMN 2: FULL-STACK CORE (Center) -->
  <g transform="translate(295, 55)">
    <rect class="column-border" x="0" y="0" width="240" height="330" rx="12" />
    <line x1="0" y1="30" x2="240" y2="30" stroke="#3a3a3c" stroke-width="1" />
    <text x="120" y="19" class="header-text">FULLSTACK_ENGINE</text>

    <!-- Fullstack details -->
    <g transform="translate(20, 55)">
      <text y="0" class="tech-category">LANGUAGES</text>
      <text y="18" class="tech-item">• Python, C++, TypeScript/JS</text>
      <text y="34" class="tech-item">• SQL (Postgres), Java</text>

      <text y="64" class="tech-category">FRONTEND_FLOW</text>
      <text y="82" class="tech-item">• React, Next.js, Zustand</text>
      <text y="98" class="tech-item">• Framer Motion, GSAP, Tailwind</text>

      <text y="128" class="tech-category">BACKEND_&amp;_CLOUD</text>
      <text y="146" class="tech-item">• FastAPI, Node.js, Django</text>
      <text y="162" class="tech-item">• Supabase, MongoDB, Redis</text>
      <text y="178" class="tech-item">• Docker, AWS, Git CI/CD</text>
    </g>
  </g>

  <!-- COLUMN 3: SECURITY CONTROLS (Right) -->
  <g transform="translate(555, 55)">
    <rect class="column-border" x="0" y="0" width="240" height="330" rx="12" />
    <line x1="0" y1="30" x2="240" y2="30" stroke="#3a3a3c" stroke-width="1" />
    <text x="120" y="19" class="header-text label-gold">SECURITY_GATEWAYS</text>

    <!-- Security details -->
    <g transform="translate(20, 55)">
      <text y="0" class="tech-category">THREAT_MITIGATION</text>
      <text y="18" class="tech-item">• OWASP Top 10 Hardening</text>
      <text y="34" class="tech-item">• Input Sanitization / SQLi Guard</text>
      <text y="50" class="tech-item">• XSS / CSRF Attack Prevention</text>

      <text y="80" class="tech-category">GATEWAY_&amp;_AUTH</text>
      <text y="98" class="tech-item">• JWT / OAuth 2.0 Protocols</text>
      <text y="114" class="tech-item">• Role-Based Access Control</text>

      <text y="145" class="tech-category">NETWORK_DIAGNOSTICS</text>
      <text y="162" class="tech-item">• Intrusion Detection Systems</text>
      <text y="178" class="tech-item">• Ethical Hacking &amp; Postman</text>
    </g>
  </g>
</svg>
