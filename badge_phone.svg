<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 50" width="250" height="50">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="btnBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1013" />
      <stop offset="100%" stop-color="#050607" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;display=swap');
    
    .btn-border {
      stroke: #ff6a00;
      stroke-width: 1.2;
      fill: url(#btnBg);
    }

    .btn-text-primary {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 11px;
      fill: #f8fafc;
      letter-spacing: 2px;
    }

    .btn-text-secondary {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #ff6a00;
      font-weight: bold;
    }

    .icon {
      fill: #ff6a00;
      filter: url(#neonGlow);
    }
  </style>

  <!-- Button Frame -->
  <rect class="btn-border" x="2" y="2" width="246" height="46" rx="4" />
  
  <!-- Tactile Sci-fi Edges -->
  <path d="M 2 12 L 2 2 L 12 2" fill="none" stroke="#ff6a00" stroke-width="2.5" filter="url(#neonGlow)" />
  <path d="M 248 38 L 248 48 L 238 48" fill="none" stroke="#ff6a00" stroke-width="2.5" filter="url(#neonGlow)" />

  <!-- Phone Icon -->
  <path class="icon" d="M 25 20 C 25 19 26 18 27 18 L 31 18 C 32 18 33 19 33 20 L 35 24 C 35 25 34 26 33 26 L 31 27 C 32 29 33 30 35 32 L 36 30 C 37 29 38 29 39 29 L 43 31 C 44 31 45 32 45 33 L 45 37 C 45 38 44 39 43 39 C 33 39 25 31 25 21 Z" />

  <!-- Texts -->
  <text x="60" y="23" class="btn-text-primary">MOBILE VOICE</text>
  <text x="60" y="37" class="btn-text-secondary">+91 86850 69281</text>
</svg>
