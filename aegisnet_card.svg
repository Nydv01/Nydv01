<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 200" width="830" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1013" />
      <stop offset="100%" stop-color="#050607" />
    </linearGradient>

    <!-- Elevated Panel Color -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>

    <!-- Frosted Border Gradient -->
    <linearGradient id="frostBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#242426" />
    </linearGradient>

    <!-- Soft Shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&amp;family=SF+Pro+Text&amp;display=swap');

    .card-border {
      stroke: url(#frostBorder);
      stroke-width: 1;
      fill: url(#panelGrad);
      filter: url(#softShadow);
    }

    .project-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 18px;
      fill: #ffffff;
      letter-spacing: 2px;
    }

    .project-subtitle {
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 11px;
      fill: #c5a880;
      letter-spacing: 1px;
    }

    .desc-text {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      fill: #e5e7eb;
    }

    .badge-rect {
      fill: #2c2c2e;
      stroke: #3a3a3c;
      stroke-width: 1;
    }

    .badge-text {
      font-family: 'Outfit', sans-serif;
      font-size: 9px;
      fill: #ffffff;
      text-anchor: middle;
    }

    /* Target Nodes & Radar sweep */
    .radar-circle {
      stroke: #c5a880;
      stroke-opacity: 0.2;
      stroke-width: 1;
      fill: none;
    }
  </style>

  <!-- Card Frame -->
  <rect class="card-border" x="15" y="15" width="800" height="170" rx="12" />

  <!-- Left: Project Descriptions -->
  <g transform="translate(45, 45)">
    <text class="project-title">AEGISNET</text>
    <text x="135" y="-4" class="project-subtitle">[ AI CYBER THREAT DETECTOR &amp; RESPONSE SOC ]</text>

    <text x="0" y="28" class="desc-text">• Shipped a production Random Forest IDS &amp; Q-Learning response agent.</text>
    <text x="0" y="46" class="desc-text">• WebSocket telemetry pipelines stream incident threats directly to React HUDs.</text>
    <text x="0" y="64" class="desc-text">• Mitigates DDoS, SQLi, Port Scan, and Brute Force attack simulation chains.</text>

    <!-- Badges -->
    <g transform="translate(0, 88)">
      <rect class="badge-rect" x="0" y="0" width="60" height="18" rx="3" />
      <text class="badge-text" x="30" y="12">REACT</text>

      <rect class="badge-rect" x="70" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="105" y="12">FASTAPI</text>

      <rect class="badge-rect" x="150" y="0" width="95" height="18" rx="3" />
      <text class="badge-text" x="197.5" y="12">SCIKIT-LEARN</text>

      <rect class="badge-rect" x="255" y="0" width="90" height="18" rx="3" />
      <text class="badge-text" x="300" y="12">WEBSOCKETS</text>

      <rect class="badge-rect" x="355" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="390" y="12">DOCKER</text>
    </g>
  </g>

  <!-- Right: Network Threat Matrix HUD visualizer -->
  <line x1="560" y1="30" x2="560" y2="170" stroke="#3a3a3c" stroke-width="1" stroke-opacity="0.5" />

  <!-- SOC Network Topology Graph -->
  <g transform="translate(565, 30)">
    <rect x="15" y="10" width="210" height="120" rx="6" fill="#09090b" fill-opacity="0.5" stroke="#3a3a3c" stroke-width="1" />
    <circle cx="120" cy="70" r="25" class="radar-circle" />
    <circle cx="120" cy="70" r="10" class="radar-circle" />
    <!-- Pulse node -->
    <circle cx="120" cy="70" r="4" fill="#30d158" />
  </g>
</svg>
