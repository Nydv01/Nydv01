<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 200" width="830" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>

    <!-- Frosted Border Gradient -->
    <linearGradient id="frostBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#242426" />
    </linearGradient>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&amp;family=Share+Tech+Mono&amp;display=swap');

    .card-border {
      stroke: url(#frostBorder);
      stroke-width: 1;
      fill: url(#panelGrad);
      filter: url(#softShadow);
    }

    .project-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 18px;
      fill: #ffffff;
      letter-spacing: 2px;
    }

    .project-subtitle {
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 10px;
      fill: #c5a880;
      letter-spacing: 1.5px;
    }

    .desc-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 11px;
      fill: #e5e7eb;
    }

    .terminal-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      fill: #a3a3a3;
    }

    .terminal-success {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      fill: #30d158;
    }

    .badge-rect {
      fill: #2c2c2e;
      stroke: #3a3a3c;
      stroke-width: 1;
    }

    .badge-text {
      font-family: 'Outfit', sans-serif;
      font-size: 9px;
      fill: #ffffff;
      text-anchor: middle;
    }

    /* Terminal Scanning Line */
    .scan-line {
      stroke: #30d158;
      stroke-width: 1;
      stroke-opacity: 0.2;
      animation: sweepLine 3s linear infinite;
    }

    @keyframes sweepLine {
      0% { y1: 15; y2: 15; }
      100% { y1: 150; y2: 150; }
    }
  </style>

  <!-- Card Frame -->
  <rect class="card-border" x="15" y="15" width="800" height="170" rx="12" />

  <!-- Left: Cyber SOC Mock Console Terminal -->
  <g transform="translate(35, 25)">
    <!-- Terminal Screen -->
    <rect x="0" y="0" width="220" height="150" rx="6" fill="#09090b" stroke="#3a3a3c" stroke-width="1" />
    
    <!-- Top terminal bar -->
    <path d="M 0,15 L 220,15" stroke="#3a3a3c" stroke-width="1" />
    <circle cx="10" cy="7.5" r="3" fill="#ff453a" />
    <circle cx="20" cy="7.5" r="3" fill="#ffcc00" />
    <circle cx="30" cy="7.5" r="3" fill="#30d158" />

    <!-- Scanning visual line -->
    <line class="scan-line" x1="0" y1="15" x2="220" y2="15" />

    <!-- Terminal logs -->
    <g transform="translate(10, 30)">
      <text y="0" class="terminal-text">> initializing aegisnet_soc...</text>
      <text y="15" class="terminal-success">[OK] models.RandomForest training completed</text>
      <text y="30" class="terminal-text">> listening socket port 8080</text>
      <text y="45" class="terminal-success">[SECURE] csrf, sql injection filters: ACTIVE</text>
      <text y="60" class="terminal-text">> monitoring threat simulation chains...</text>
      <text y="75" class="terminal-text">> threat index: 0.00% (idle)</text>
      
      <!-- Blinking cursor -->
      <rect x="135" y="67" width="4" height="8" fill="#30d158">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>

  <!-- Right: Project Descriptions and details (Stacked Vertically) -->
  <g transform="translate(275, 40)">
    <text class="project-title" y="10">AEGISNET</text>
    <text class="project-subtitle" y="26">[ AI CYBER THREAT DETECTOR AND RESPONSE SOC ]</text>

    <!-- Details -->
    <text x="0" y="48" class="desc-text">• Deployed a random forest classifier to identify cyber attacks in real-time.</text>
    <text x="0" y="66" class="desc-text">• Wired WebSocket streaming pipeline feeding attack telemetry directly to React HUDs.</text>
    <text x="0" y="84" class="desc-text">• Built Q-learning response agent nodes to auto-mitigate simulated DDoS threats.</text>

    <!-- Badges -->
    <g transform="translate(0, 100)">
      <rect class="badge-rect" x="0" y="0" width="60" height="18" rx="3" />
      <text class="badge-text" x="30" y="12">REACT</text>

      <rect class="badge-rect" x="70" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="105" y="12">FASTAPI</text>

      <rect class="badge-rect" x="150" y="0" width="95" height="18" rx="3" />
      <text class="badge-text" x="197.5" y="12">SCIKIT-LEARN</text>

      <rect class="badge-rect" x="255" y="0" width="90" height="18" rx="3" />
      <text class="badge-text" x="300" y="12">WEBSOCKETS</text>

      <rect class="badge-rect" x="355" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="390" y="12">DOCKER</text>
    </g>
  </g>
</svg>
