<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 200" width="830" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1013" />
      <stop offset="100%" stop-color="#050607" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="orangeGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="whiteGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;display=swap');

    .card-border {
      stroke: #ff6a00;
      stroke-width: 1.5;
      stroke-opacity: 0.25;
      fill: url(#cardBg);
    }

    .project-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 18px;
      fill: #ffffff;
      letter-spacing: 2px;
    }

    .project-title-glow {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 18px;
      fill: #ff6a00;
      letter-spacing: 2px;
      opacity: 0.85;
      filter: url(#orangeGlow);
    }

    .project-subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #ff6a00;
      letter-spacing: 1px;
    }

    .desc-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      fill: #94a3b8;
    }

    .badge-rect {
      fill: #0c101d;
      stroke: #ff6a00;
      stroke-opacity: 0.3;
      stroke-dasharray: 4 2;
    }

    .badge-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      fill: #e2e8f0;
      text-anchor: middle;
    }

    /* Attack Vectors Dash Flow */
    .attack-path {
      stroke: #ff6a00;
      stroke-width: 1.5;
      stroke-dasharray: 6 6;
      animation: attackFlow 4s linear infinite;
    }

    @keyframes attackFlow {
      to { stroke-dashoffset: -60; }
    }

    .pulse-node {
      animation: ping 2s infinite ease-in-out;
    }

    @keyframes ping {
      0%, 100% { r: 3px; opacity: 0.4; }
      50% { r: 6px; opacity: 1; }
    }

    /* Scanning Radar Line */
    .radar-beam {
      stroke: #ff6a00;
      stroke-width: 1;
      stroke-opacity: 0.2;
      animation: radarScan 3s linear infinite;
    }

    @keyframes radarScan {
      0% { x1: 580; x2: 580; }
      50% { x1: 790; x2: 790; }
      100% { x1: 580; x2: 580; }
    }
  </style>

  <!-- Card Frame -->
  <rect class="card-border" x="15" y="15" width="800" height="170" rx="6" />

  <!-- Side Accent Corner Brackets -->
  <path d="M 15,35 L 15,15 L 35,15" fill="none" stroke="#ff6a00" stroke-width="3" filter="url(#orangeGlow)" />
  <path d="M 815,145 L 815,165 L 795,165" fill="none" stroke="#ff6a00" stroke-width="3" filter="url(#orangeGlow)" />

  <!-- Left: Project Descriptions -->
  <g transform="translate(45, 45)">
    <text class="project-title-glow">AEGISNET</text>
    <text class="project-title">AEGISNET</text>
    <text x="135" y="5" class="project-subtitle">[ AI CYBER THREAT DETECTOR &amp; RESPONSE SOC ]</text>

    <text x="0" y="32" class="desc-text">• Shipped a production Random Forest IDS &amp; Q-Learning response agent.</text>
    <text x="0" y="50" class="desc-text">• WebSocket telemetry pipelines stream incident threats directly to React HUDs.</text>
    <text x="0" y="68" class="desc-text">• Mitigates DDoS, SQLi, Port Scan, and Brute Force attack simulation chains.</text>

    <!-- Badges -->
    <g transform="translate(0, 88)">
      <rect class="badge-rect" x="0" y="0" width="60" height="18" rx="3" />
      <text class="badge-text" x="30" y="12">REACT</text>

      <rect class="badge-rect" x="70" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="105" y="12">FASTAPI</text>

      <rect class="badge-rect" x="150" y="0" width="95" height="18" rx="3" />
      <text class="badge-text" x="197.5" y="12">SCIKIT-LEARN</text>

      <rect class="badge-rect" x="255" y="0" width="90" height="18" rx="3" />
      <text class="badge-text" x="300" y="12">WEBSOCKETS</text>

      <rect class="badge-rect" x="355" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="390" y="12">DOCKER</text>
    </g>
  </g>

  <!-- Right: Network Threat Matrix HUD visualizer -->
  <line x1="560" y1="30" x2="560" y2="170" stroke="#ff6a00" stroke-opacity="0.15" stroke-dasharray="5 5" />

  <!-- SOC Network Topology Graph -->
  <g transform="translate(565, 30)">
    <!-- Radar scanner beam -->
    <line class="radar-beam" x1="580" y1="10" x2="580" y2="130" />
    
    <!-- Outer Box frame -->
    <rect x="15" y="10" width="210" height="120" rx="3" fill="#080c10" fill-opacity="0.5" stroke="#ff6a00" stroke-opacity="0.1" />

    <!-- Server Target Nodes -->
    <g fill="none">
      <!-- Network grid lines -->
      <line x1="40" y1="70" x2="110" y2="35" stroke="#718096" stroke-opacity="0.2" />
      <line x1="40" y1="70" x2="110" y2="105" stroke="#718096" stroke-opacity="0.2" />
      <line x1="110" y1="35" x2="180" y2="70" stroke="#718096" stroke-opacity="0.2" />
      <line x1="110" y1="105" x2="180" y2="70" stroke="#718096" stroke-opacity="0.2" />

      <!-- Attack flow path -->
      <path class="attack-path" d="M 40,70 L 110,35 L 180,70" />
      
      <!-- Nodes visual representation -->
      <circle cx="40" cy="70" r="5" fill="#ff6a00" filter="url(#orangeGlow)" />
      <circle class="pulse-node" cx="40" cy="70" r="5" fill="#ff6a00" />
      
      <!-- Shield interception node -->
      <circle cx="110" cy="35" r="5" fill="#ffffff" filter="url(#whiteGlow)" />
      <circle class="pulse-node" cx="110" cy="35" r="5" fill="#ffffff" />
      
      <circle cx="110" cy="105" r="5" fill="#ff6a00" />
      <circle cx="180" cy="70" r="5" fill="#ff6a00" />
    </g>

    <!-- Telemetry labels -->
    <text x="25" y="120" font-family="'Share Tech Mono', monospace" font-size="8" fill="#ff6a00" font-weight="bold">THREAT_VECTOR [MITIGATED]</text>
  </g>
</svg>
