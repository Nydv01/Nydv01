<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 180" width="830" height="180">
  <defs>
    <!-- Card Elevate Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>

    <!-- Frosted Border Gradient -->
    <linearGradient id="frostBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#242426" />
    </linearGradient>

    <!-- Ring Gradients -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c5a880" />
      <stop offset="100%" stop-color="#dfc39a" />
    </linearGradient>

    <linearGradient id="blueGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0066cc" />
      <stop offset="100%" stop-color="#0080ff" />
    </linearGradient>

    <linearGradient id="greenGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#248a3d" />
      <stop offset="100%" stop-color="#30d158" />
    </linearGradient>

    <!-- Subtle Shadows -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&amp;family=SF+Pro+Text&amp;display=swap');

    .board-bg {
      fill: #09090b;
    }

    .widget-card {
      fill: url(#cardGrad);
      stroke: url(#frostBorder);
      stroke-width: 1;
      filter: url(#softShadow);
    }

    .widget-title {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 11px;
      fill: #8e8e93;
      letter-spacing: 0.5px;
    }

    .widget-value {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-weight: 700;
      font-size: 22px;
      fill: #f5f5f7;
    }

    .widget-desc {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 10px;
      fill: #8e8e93;
    }

    /* Ring Gauge Animations */
    .ring-bg {
      fill: none;
      stroke: #2c2c2e;
      stroke-width: 6;
    }

    .ring-fill {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: center;
    }

    .gold-ring {
      stroke: url(#goldGrad);
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      animation: fillGold 1.5s ease-out forwards;
    }

    .blue-ring {
      stroke: url(#blueGrad);
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      animation: fillBlue 1.5s ease-out forwards;
      animation-delay: 0.2s;
    }

    .green-ring {
      stroke: url(#greenGrad);
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      animation: fillGreen 1.5s ease-out forwards;
      animation-delay: 0.4s;
    }

    @keyframes fillGold { to { stroke-dashoffset: 35; } }   /* 84% fill */
    @keyframes fillBlue { to { stroke-dashoffset: 66; } }   /* 70% fill */
    @keyframes fillGreen { to { stroke-dashoffset: 10; } }  /* 95% fill */

    /* Pulse/EKG Telemetry Animation */
    .pulse-line {
      fill: none;
      stroke: #30d158;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: sweepPulse 3s linear infinite;
    }

    @keyframes sweepPulse {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: -100; }
    }
  </style>

  <!-- Background base -->
  <rect class="board-bg" width="100%" height="100%" rx="16" />

  <!-- 4 Elevated Cards in Apple Row Layout -->
  
  <!-- CARD 1: Commits -->
  <g transform="translate(20, 20)">
    <rect class="widget-card" width="180" height="140" rx="12" />
    <text x="20" y="32" class="widget-title">COMMITS LOGGED</text>
    <text x="20" y="62" class="widget-value">1,500+</text>
    <text x="20" y="115" class="widget-desc">GitHub Contribution Index</text>

    <!-- Ring Dial in corner -->
    <g transform="translate(135, 55)">
      <circle class="ring-bg" cx="0" cy="0" r="22" />
      <circle class="ring-fill gold-ring" cx="0" cy="0" r="22" />
    </g>
  </g>

  <!-- CARD 2: Shipped Repos -->
  <g transform="translate(215, 20)">
    <rect class="widget-card" width="180" height="140" rx="12" />
    <text x="20" y="32" class="widget-title">SHIPPED REPOS</text>
    <text x="20" y="62" class="widget-value">24 Total</text>
    <text x="20" y="115" class="widget-desc">Production Integrations</text>

    <!-- Ring Dial in corner -->
    <g transform="translate(135, 55)">
      <circle class="ring-bg" cx="0" cy="0" r="22" />
      <circle class="ring-fill blue-ring" cx="0" cy="0" r="22" />
    </g>
  </g>

  <!-- CARD 3: PR Merge Rate -->
  <g transform="translate(410, 20)">
    <rect class="widget-card" width="180" height="140" rx="12" />
    <text x="20" y="32" class="widget-title">MERGE INTEGRITY</text>
    <text x="20" y="62" class="widget-value">98.2%</text>
    <text x="20" y="115" class="widget-desc">Pull Request Success</text>

    <!-- Ring Dial in corner -->
    <g transform="translate(135, 55)">
      <circle class="ring-bg" cx="0" cy="0" r="22" />
      <circle class="ring-fill green-ring" cx="0" cy="0" r="22" />
    </g>
  </g>

  <!-- CARD 4: System State EKG -->
  <g transform="translate(605, 20)">
    <rect class="widget-card" width="205" height="140" rx="12" />
    <text x="20" y="32" class="widget-title">SYSTEM STATUS</text>
    <text x="20" y="62" class="widget-value" fill="#30d158">ACTIVE</text>
    <text x="20" y="115" class="widget-desc">Active Environment Log</text>

    <!-- Pulse graph -->
    <g transform="translate(100, 30)">
      <path class="pulse-line" d="M 0,25 L 20,25 L 25,10 L 30,35 L 35,22 L 40,25 L 80,25" />
    </g>
  </g>
</svg>
