<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 200" width="830" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>

    <!-- Frosted Border Gradient -->
    <linearGradient id="frostBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#242426" />
    </linearGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c5a880" />
      <stop offset="100%" stop-color="#dfc39a" />
    </linearGradient>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&amp;display=swap');

    .card-border {
      stroke: url(#frostBorder);
      stroke-width: 1;
      fill: url(#panelGrad);
      filter: url(#softShadow);
    }

    .title-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 24px;
      fill: #ffffff;
      letter-spacing: 4px;
    }

    .subtitle-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 11px;
      fill: #c5a880;
      letter-spacing: 2px;
    }

    .desc-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 11px;
      fill: #8e8e93;
      text-anchor: middle;
    }

    .badge-rect {
      fill: #2c2c2e;
      stroke: #3a3a3c;
      stroke-width: 1;
    }

    .badge-text {
      font-family: 'Outfit', sans-serif;
      font-size: 9px;
      fill: #ffffff;
      text-anchor: middle;
    }

    /* Abstract math waves */
    .math-wave {
      fill: none;
      stroke: url(#goldGrad);
      stroke-width: 1.5;
      stroke-opacity: 0.15;
    }

    .math-wave-active {
      fill: none;
      stroke: url(#goldGrad);
      stroke-width: 2;
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: waveFlow 4s linear infinite;
    }

    @keyframes waveFlow {
      to { stroke-dashoffset: 0; }
    }
  </style>

  <!-- Card Frame -->
  <rect class="card-border" x="15" y="15" width="800" height="170" rx="12" />

  <!-- Background Math waves (Abstract Shader representation) -->
  <path class="math-wave" d="M 30,100 Q 150,20 300,120 T 600,80 T 800,100" />
  <path class="math-wave" d="M 30,120 Q 200,160 400,60 T 700,140 T 800,120" stroke-opacity="0.08" />
  <path class="math-wave-active" d="M 30,100 Q 150,20 300,120 T 600,80 T 800,100" />

  <!-- Center Content Layout -->
  <g transform="translate(415, 55)" text-anchor="middle">
    <text class="title-text" y="10">PROPOSAL</text>
    <text class="subtitle-text" y="30">[ THREE.JS SHADER EXPERIMENT ]</text>
    
    <text class="desc-text" y="55">A premium 3D math and particle workspace rendering GLSL vertex shaders</text>
    <text class="desc-text" y="72">integrated with real-time Tone.js FM synthesis and GSAP ScrollTrigger timelines.</text>

    <!-- Badges Row -->
    <g transform="translate(-190, 88)">
      <rect class="badge-rect" x="0" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="35" y="12">THREE.JS</text>

      <rect class="badge-rect" x="80" y="0" width="95" height="18" rx="3" />
      <text class="badge-text" x="127.5" y="12">GLSL SHADERS</text>

      <rect class="badge-rect" x="185" y="0" width="60" height="18" rx="3" />
      <text class="badge-text" x="215" y="12">GSAP</text>

      <rect class="badge-rect" x="255" y="0" width="60" height="18" rx="3" />
      <text class="badge-text" x="285" y="12">TONE.JS</text>

      <rect class="badge-rect" x="325" y="0" width="55" height="18" rx="3" />
      <text class="badge-text" x="352.5" y="12">VITE</text>
    </g>
  </g>
</svg>
