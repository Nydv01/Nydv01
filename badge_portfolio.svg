<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 50" width="250" height="50">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="btnBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c101d" />
      <stop offset="100%" stop-color="#04060b" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;display=swap');
    
    .btn-border {
      stroke: #9e00ff;
      stroke-width: 1.5;
      fill: url(#btnBg);
    }

    .btn-text-primary {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 11px;
      fill: #ffffff;
      letter-spacing: 2px;
    }

    .btn-text-secondary {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #9e00ff;
      font-weight: bold;
    }

    .icon {
      fill: #9e00ff;
      filter: url(#neonGlow);
    }
  </style>

  <!-- Button Frame -->
  <rect class="btn-border" x="2" y="2" width="246" height="46" rx="4" />
  
  <!-- Tactile Sci-fi Edges -->
  <path d="M 2 12 L 2 2 L 12 2" fill="none" stroke="#9e00ff" stroke-width="2.5" filter="url(#neonGlow)" />
  <path d="M 248 38 L 248 48 L 238 48" fill="none" stroke="#9e00ff" stroke-width="2.5" filter="url(#neonGlow)" />

  <!-- Globe/Web Icon -->
  <path class="icon" d="M 23 20 A 10 10 0 1 0 43 20 A 10 10 0 1 0 23 20 Z M 24 20 C 24 20 28 11 33 11 C 38 11 42 20 42 20 C 42 20 38 29 33 29 C 28 29 24 20 24 20 Z M 33 11 L 33 29 M 23.5 16 L 42.5 16 M 23.5 24 L 42.5 24" transform="translate(0, 5)" />

  <!-- Texts -->
  <text x="60" y="23" class="btn-text-primary">PORTFOLIO HUB</text>
  <text x="60" y="37" class="btn-text-secondary">nitin-yadav.vercel.app</text>
</svg>
