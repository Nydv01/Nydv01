<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 50" width="250" height="50">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="btnBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>

    <!-- Frosted Border Gradient -->
    <linearGradient id="frostBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#242426" />
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&amp;display=swap');
    
    .btn-border {
      stroke: url(#frostBorder);
      stroke-width: 1;
      fill: url(#btnBg);
    }

    .btn-text-primary {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 11px;
      fill: #ffffff;
      letter-spacing: 1px;
    }

    .btn-text-secondary {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 10px;
      fill: #8e8e93;
    }

    .icon {
      fill: #c5a880; /* Apple Pro Gold */
    }
  </style>

  <!-- Button Frame -->
  <rect class="btn-border" x="1" y="1" width="248" height="48" rx="10" />

  <!-- Globe/Web Icon -->
  <path class="icon" d="M 23 20 A 10 10 0 1 0 43 20 A 10 10 0 1 0 23 20 Z M 24 20 C 24 20 28 11 33 11 C 38 11 42 20 42 20 C 42 20 38 29 33 29 C 28 29 24 20 24 20 Z M 33 11 L 33 29 M 23.5 16 L 42.5 16 M 23.5 24 L 42.5 24" transform="translate(0, 5)" />

  <!-- Texts -->
  <text x="60" y="22" class="btn-text-primary">PORTFOLIO HUB</text>
  <text x="60" y="36" class="btn-text-secondary">nitin-yadav.vercel.app</text>
</svg>
