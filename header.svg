<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 280" width="830" height="280">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c16" />
      <stop offset="50%" stop-color="#04060b" />
      <stop offset="100%" stop-color="#020305" />
    </linearGradient>

    <!-- Tech Grid Pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#00f3ff" fill-opacity="0.08" />
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00f3ff" stroke-width="0.5" stroke-opacity="0.03" />
    </pattern>

    <!-- Glow Filters -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="purpleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Circuit Laser Gradient -->
    <linearGradient id="laserGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9e00ff" stop-opacity="0" />
      <stop offset="50%" stop-color="#00f3ff" stop-opacity="1" />
      <stop offset="100%" stop-color="#9e00ff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;display=swap');

    .title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 44px;
      fill: #ffffff;
      letter-spacing: 7px;
    }

    .title-glow {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 44px;
      fill: #00f3ff;
      letter-spacing: 7px;
      opacity: 0.85;
      filter: url(#cyanGlow);
    }

    .subtitle {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 13px;
      fill: #9e00ff;
      letter-spacing: 4px;
      filter: url(#purpleGlow);
    }

    .hud-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #64748b;
    }

    .hud-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #00f3ff;
      font-weight: bold;
    }

    .hud-alert {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #00ff66;
      font-weight: bold;
      animation: alertPulse 1s step-end infinite;
    }

    @keyframes alertPulse {
      0%, 100% { fill: #00ff66; opacity: 1; }
      50% { fill: #00ff66; opacity: 0.3; }
    }

    /* Circuit Paths Animation */
    .circuit-path {
      stroke: url(#laserGrad);
      stroke-width: 2;
      stroke-dasharray: 120 400;
      animation: circuitRun 5s linear infinite;
    }

    .circuit-path-reverse {
      stroke: url(#laserGrad);
      stroke-width: 1.5;
      stroke-dasharray: 80 300;
      animation: circuitRun 4s linear infinite reverse;
    }

    @keyframes circuitRun {
      0% { stroke-dashoffset: 600; }
      100% { stroke-dashoffset: 0; }
    }

    /* System Status Bars */
    .metric-bar-fill {
      fill: #00f3ff;
      filter: url(#cyanGlow);
      animation: barStretch 3s ease-in-out infinite alternate;
    }

    @keyframes barStretch {
      0% { width: 40px; }
      100% { width: 110px; }
    }

    /* Glitch Grid Animation */
    .glitch-grid {
      stroke: #00f3ff;
      stroke-opacity: 0.15;
      stroke-width: 0.5;
      animation: gridShudder 10s ease-in-out infinite;
    }

    @keyframes gridShudder {
      0%, 94%, 96%, 100% { transform: translate(0, 0); }
      95% { transform: translate(-1px, 1px); stroke-opacity: 0.3; }
      97% { transform: translate(1px, -1px); }
    }
  </style>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect class="glitch-grid" width="100%" height="100%" fill="url(#grid)" />

  <!-- Isometric Circuit Lines -->
  <path class="circuit-path" d="M 50,50 L 220,50 L 280,110 L 460,110 L 510,60 L 780,60" fill="none" />
  <path class="circuit-path-reverse" d="M 80,230 L 250,230 L 300,180 L 480,180 L 520,220 L 750,220" fill="none" />

  <!-- Futuristic Corner Brackets -->
  <path d="M 25,50 L 25,25 L 50,25" fill="none" stroke="#00f3ff" stroke-width="2" stroke-opacity="0.3" />
  <path d="M 805,50 L 805,25 L 780,25" fill="none" stroke="#9e00ff" stroke-width="2" stroke-opacity="0.3" />
  <path d="M 25,230 L 25,255 L 50,255" fill="none" stroke="#9e00ff" stroke-width="2" stroke-opacity="0.3" />
  <path d="M 805,230 L 805,255 L 780,255" fill="none" stroke="#00f3ff" stroke-width="2" stroke-opacity="0.3" />

  <!-- Header Text -->
  <g transform="translate(60, 115)">
    <!-- Main Glowing Logo -->
    <text class="title-glow">NITIN YADAV</text>
    <text class="title">NITIN YADAV</text>

    <!-- Subtitle Tech Role -->
    <text y="30" class="subtitle">FULL-STACK ENGINEER / AI &amp; CYBERSECURITY</text>
  </g>

  <!-- Right Side: Developer Cockpit Telemetry Console -->
  <g transform="translate(560, 85)">
    <!-- Console border -->
    <rect x="-10" y="-10" width="220" height="110" rx="4" fill="#070b13" fill-opacity="0.6" stroke="#00f3ff" stroke-opacity="0.15" />
    <rect x="-10" y="-10" width="220" height="110" rx="4" fill="none" stroke="#9e00ff" stroke-opacity="0.1" stroke-dasharray="10 5" />
    
    <!-- Crosshair telemetry -->
    <circle cx="195" cy="15" r="4" fill="none" stroke="#00f3ff" stroke-opacity="0.3" />
    <line x1="191" y1="15" x2="199" y2="15" stroke="#00f3ff" stroke-opacity="0.3" />
    <line x1="195" y1="11" x2="195" y2="19" stroke="#00f3ff" stroke-opacity="0.3" />

    <!-- Telemetry Variables -->
    <text x="10" y="20" class="hud-label">COGNITIVE_CORE:</text>
    <text x="115" y="20" class="hud-value">ONLINE</text>

    <text x="10" y="40" class="hud-label">THREAT_DEFENSE:</text>
    <text x="115" y="40" class="hud-alert">SECURE [100%]</text>

    <text x="10" y="60" class="hud-label">ENGINE_LOAD:</text>
    
    <!-- Animated metric bar -->
    <rect x="95" y="52" width="110" height="6" rx="2" fill="#1e293b" />
    <rect class="metric-bar-fill" x="95" y="52" width="65" height="6" rx="2" />

    <!-- Decoy Hex logs scrolling or system state -->
    <text x="10" y="85" class="hud-label" font-size="9" fill="#475569">> sys_init --success // 12+ mods loaded</text>
  </g>

  <!-- Animated Center Telemetry Vector -->
  <g transform="translate(490, 110)" stroke="#00f3ff" stroke-opacity="0.2" fill="none">
    <ellipse cx="20" cy="30" rx="15" ry="30" stroke-dasharray="2 4">
      <animateTransform attributeName="transform" type="rotate" from="0 20 30" to="360 20 30" dur="10s" repeatCount="indefinite" />
    </ellipse>
    <circle cx="20" cy="30" r="4" fill="#00f3ff" filter="url(#cyanGlow)" />
  </g>
</svg>
