<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 280" width="830" height="280">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17" />
      <stop offset="100%" stop-color="#030508" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.04" />
    </pattern>

    <!-- Glow Filters -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="purpleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Laser Gradients -->
    <linearGradient id="laserGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0" />
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="1" />
      <stop offset="100%" stop-color="#bf55ec" stop-opacity="0" />
    </linearGradient>

    <!-- Text Clip for Typewriter -->
    <clipPath id="typewriterClip">
      <rect id="typewriterRect" x="60" y="160" width="0" height="30">
        <animate attributeName="width" 
                 values="0; 0; 480; 480; 0; 0" 
                 keyTimes="0; 0.1; 0.5; 0.8; 0.9; 1" 
                 dur="8s" 
                 repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <style>
    /* Font Loading */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&amp;family=Share+Tech+Mono&amp;display=swap');

    .title {
      font-family: 'Orbitron', 'Segoe UI', sans-serif;
      font-weight: 900;
      font-size: 42px;
      fill: #ffffff;
      letter-spacing: 5px;
    }

    .title-glow {
      font-family: 'Orbitron', 'Segoe UI', sans-serif;
      font-weight: 900;
      font-size: 42px;
      fill: #00f0ff;
      letter-spacing: 5px;
      opacity: 0.8;
      filter: url(#cyanGlow);
    }

    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 17px;
      fill: #00f0ff;
      letter-spacing: 2px;
    }

    .cursor {
      fill: #bf55ec;
      filter: url(#purpleGlow);
    }

    .cyber-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      fill: #6b7c96;
      letter-spacing: 1px;
    }

    .cyber-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #bf55ec;
    }

    /* Laser Line Animations */
    .laser-line {
      stroke: url(#laserGrad);
      stroke-width: 2;
      stroke-dasharray: 200 600;
      animation: laserSweep 6s linear indefinite;
    }

    .laser-line-fast {
      stroke: url(#laserGrad);
      stroke-width: 1.5;
      stroke-dasharray: 100 400;
      animation: laserSweep 4s linear indefinite reverse;
    }

    @keyframes laserSweep {
      0% { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }

    /* Node Animations */
    .pulse-node {
      animation: pulse 3s ease-in-out infinite;
    }

    .pulse-node-delayed {
      animation: pulse 3s ease-in-out infinite;
      animation-delay: 1.5s;
    }

    @keyframes pulse {
      0%, 100% { r: 5px; opacity: 0.4; }
      50% { r: 9px; opacity: 1; }
    }

    /* Connection Lines Pulse */
    .connection-line {
      stroke: #00f0ff;
      stroke-width: 1;
      stroke-opacity: 0.15;
      stroke-dasharray: 5 5;
      animation: dash 10s linear infinite;
    }

    @keyframes dash {
      to { stroke-dashoffset: -100; }
    }

    /* Terminal Status Box Pulse */
    .status-dot {
      fill: #00ff66;
      animation: blink 1.5s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Background Animated Cyber Lines -->
  <path class="laser-line" d="M -100 80 Q 200 40 400 120 T 930 60" fill="none" />
  <path class="laser-line-fast" d="M -100 200 Q 300 240 500 150 T 930 220" fill="none" />
  
  <!-- Subtly Glowing Tech Circles in Background -->
  <circle cx="700" cy="140" r="100" fill="none" stroke="#bf55ec" stroke-opacity="0.05" stroke-width="1" />
  <circle cx="700" cy="140" r="70" fill="none" stroke="#00f0ff" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="10 10" />

  <!-- AI Neural Network Nodes / Connected Cluster -->
  <!-- Connections -->
  <line class="connection-line" x1="680" y1="90" x2="740" y2="100" />
  <line class="connection-line" x1="740" y1="100" x2="710" y2="180" />
  <line class="connection-line" x1="710" y1="180" x2="630" y2="150" />
  <line class="connection-line" x1="630" y1="150" x2="680" y2="90" />
  <line class="connection-line" x1="680" y1="90" x2="710" y2="180" />

  <!-- Dots -->
  <circle cx="680" cy="90" r="6" fill="#bf55ec" filter="url(#purpleGlow)" />
  <circle class="pulse-node" cx="680" cy="90" r="6" fill="#bf55ec" />
  
  <circle cx="740" cy="100" r="6" fill="#00f0ff" filter="url(#cyanGlow)" />
  <circle class="pulse-node-delayed" cx="740" cy="100" r="6" fill="#00f0ff" />
  
  <circle cx="710" cy="180" r="6" fill="#bf55ec" filter="url(#purpleGlow)" />
  <circle class="pulse-node" cx="710" cy="180" r="6" fill="#bf55ec" />
  
  <circle cx="630" cy="150" r="6" fill="#00f0ff" filter="url(#cyanGlow)" />
  <circle class="pulse-node-delayed" cx="630" cy="150" r="6" fill="#00f0ff" />

  <!-- Brand Headers -->
  <!-- Glow Layer -->
  <text x="60" y="125" class="title-glow">NITIN YADAV</text>
  <!-- Foreground Text -->
  <text x="60" y="125" class="title">NITIN YADAV</text>

  <!-- Typewriter Subtitle -->
  <!-- Unclipped text is hidden, clipped version is shown -->
  <g clip-path="url(#typewriterClip)">
    <text x="60" y="175" class="subtitle">Full-Stack Engineer | AI/ML Systems | Cybersecurity</text>
  </g>
  
  <!-- Blinking Cursor following the typing text -->
  <rect class="cursor" x="60" y="160" width="3" height="20">
    <animateTransform attributeName="transform" 
                      type="translate" 
                      values="0 0; 0 0; 480 0; 480 0; 0 0; 0 0" 
                      keyTimes="0; 0.1; 0.5; 0.8; 0.9; 1" 
                      dur="8s" 
                      repeatCount="indefinite" />
    <animate attributeName="opacity" 
             values="1;0;1;0;1" 
             keyTimes="0;0.25;0.5;0.75;1" 
             dur="1s" 
             repeatCount="indefinite" />
  </rect>

  <!-- Cyber Dashboard Labels / Details (Bottom Bar) -->
  <g transform="translate(60, 220)">
    <!-- Node status -->
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#0c101d" stroke="#00f0ff" stroke-opacity="0.2" />
    <circle class="status-dot" cx="6" cy="6" r="3" />
    <text x="20" y="10" class="cyber-label">SECURE_NODE_01: <tspan class="cyber-value">ONLINE</tspan></text>

    <!-- Location -->
    <text x="200" y="10" class="cyber-label">LOC: <tspan class="cyber-value">GURUGRAM, IN</tspan></text>
    
    <!-- Shipped projects count -->
    <text x="360" y="10" class="cyber-label">SHIPPED_MODS: <tspan class="cyber-value">12+ PROD APPS</tspan></text>
  </g>

  <!-- Tech Design Accents -->
  <!-- Top cyber-border -->
  <line x1="60" y1="40" x2="770" y2="40" stroke="#00f0ff" stroke-opacity="0.1" />
  <line x1="60" y1="40" x2="120" y2="40" stroke="#00f0ff" stroke-opacity="0.6" stroke-width="2" />
  <line x1="710" y1="40" x2="770" y2="40" stroke="#bf55ec" stroke-opacity="0.6" stroke-width="2" />
</svg>
