<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 280" width="830" height="280">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c" />
      <stop offset="100%" stop-color="#020203" />
    </linearGradient>

    <!-- Elevated Panel Color -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>

    <!-- Frosted Border Gradient -->
    <linearGradient id="frostBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#242426" />
    </linearGradient>

    <!-- Typewriter Clip Path -->
    <clipPath id="typewriterClip">
      <rect id="typewriterRect" x="60" y="145" width="0" height="30">
        <animate attributeName="width" 
                 values="0; 0; 600; 600; 0; 0" 
                 keyTimes="0; 0.1; 0.5; 0.8; 0.9; 1" 
                 dur="6s" 
                 repeatCount="indefinite" />
      </rect>
    </clipPath>

    <!-- Subtle Shadows -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&amp;display=swap');

    .title {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-weight: 900;
      font-size: 46px;
      fill: #ffffff;
      letter-spacing: 6px;
    }

    .subtitle {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 13px;
      fill: #c5a880; /* Apple Pro Gold */
      letter-spacing: 3px;
    }

    .hud-label {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      fill: #8e8e93;
    }

    .hud-value {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      fill: #ffffff;
      font-weight: 500;
    }

    .hud-alert {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      fill: #30d158; /* Apple System Green */
      font-weight: 500;
    }

    /* Circuit Paths Animation */
    .circuit-path {
      stroke: #3a3a3c;
      stroke-width: 1;
      stroke-dasharray: 100 400;
      animation: circuitRun 6s linear infinite;
    }

    .circuit-path-reverse {
      stroke: #2c2c2e;
      stroke-width: 1;
      stroke-dasharray: 80 300;
      animation: circuitRun 5s linear infinite reverse;
    }

    @keyframes circuitRun {
      0% { stroke-dashoffset: 600; }
      100% { stroke-dashoffset: 0; }
    }

    /* System Status Bars */
    .metric-bar-fill {
      fill: #8e8e93;
      animation: barStretch 4s ease-in-out infinite alternate;
    }

    @keyframes barStretch {
      0% { width: 30px; }
      100% { width: 100px; }
    }
  </style>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Thin Tech Lines -->
  <path class="circuit-path" d="M 50,50 L 220,50 L 280,110 L 460,110 L 510,60 L 780,60" fill="none" />
  <path class="circuit-path-reverse" d="M 80,230 L 250,230 L 300,180 L 480,180 L 520,220 L 750,220" fill="none" />

  <!-- Corner Brackets -->
  <path d="M 25,50 L 25,25 L 50,25" fill="none" stroke="#3a3a3c" stroke-width="1" />
  <path d="M 805,50 L 805,25 L 780,25" fill="none" stroke="#3a3a3c" stroke-width="1" />
  <path d="M 25,230 L 25,255 L 50,255" fill="none" stroke="#3a3a3c" stroke-width="1" />
  <path d="M 805,230 L 805,255 L 780,255" fill="none" stroke="#3a3a3c" stroke-width="1" />

  <!-- Header Text -->
  <g transform="translate(60, 115)">
    <!-- Main Logo -->
    <text class="title">NITIN YADAV</text>
  </g>

  <!-- Typewriter Subtitle -->
  <g clip-path="url(#typewriterClip)">
    <text x="60" y="165" class="subtitle">FULL-STACK ENGINEER // AI &amp; CYBERSECURITY</text>
  </g>

  <!-- Blinking Cursor -->
  <rect fill="#c5a880" x="60" y="150" width="2" height="18">
    <animateTransform attributeName="transform" 
                      type="translate" 
                      values="0 0; 0 0; 455 0; 455 0; 0 0; 0 0" 
                      keyTimes="0; 0.1; 0.5; 0.8; 0.9; 1" 
                      dur="6s" 
                      repeatCount="indefinite" />
    <animate attributeName="opacity" 
             values="1;0;1;0;1" 
             keyTimes="0;0.25;0.5;0.75;1" 
             dur="1s" 
             repeatCount="indefinite" />
  </rect>

  <!-- Right Side: Apple Style Telemetry Console -->
  <g transform="translate(560, 85)">
    <!-- Console border -->
    <rect x="-10" y="-10" width="220" height="110" rx="10" fill="url(#panelGrad)" stroke="url(#frostBorder)" stroke-width="1" filter="url(#softShadow)" />
    
    <!-- Telemetry Variables -->
    <text x="15" y="22" class="hud-label">COGNITIVE_CORE:</text>
    <text x="125" y="22" class="hud-value">ONLINE</text>

    <text x="15" y="44" class="hud-label">THREAT_DEFENSE:</text>
    <text x="125" y="44" class="hud-alert">SECURE [100%]</text>

    <text x="15" y="66" class="hud-label">ENGINE_LOAD:</text>
    
    <!-- Status bar -->
    <rect x="95" y="58" width="100" height="5" rx="2.5" fill="#2c2c2e" />
    <rect class="metric-bar-fill" x="95" y="58" width="60" height="5" rx="2.5" />

    <!-- Terminal log -->
    <text x="15" y="90" class="hud-label" font-size="9" fill="#8e8e93">> sys_init // 12+ modules loaded</text>
  </g>
</svg>
