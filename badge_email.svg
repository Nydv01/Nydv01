<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 50" width="250" height="50">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="btnBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1013" />
      <stop offset="100%" stop-color="#050607" />
    </linearGradient>

    <!-- Orange Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;display=swap');
    
    .btn-border {
      stroke: #ff6a00;
      stroke-width: 1.2;
      fill: url(#btnBg);
    }

    .btn-text-primary {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 11px;
      fill: #f8fafc;
      letter-spacing: 2px;
    }

    .btn-text-secondary {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #ff6a00;
      font-weight: bold;
    }

    .icon {
      fill: #ff6a00;
      filter: url(#neonGlow);
    }
  </style>

  <!-- Button Frame -->
  <rect class="btn-border" x="2" y="2" width="246" height="46" rx="4" />
  
  <!-- Tactile Sci-fi Edges -->
  <path d="M 2 12 L 2 2 L 12 2" fill="none" stroke="#ff6a00" stroke-width="2.5" filter="url(#neonGlow)" />
  <path d="M 248 38 L 248 48 L 238 48" fill="none" stroke="#ff6a00" stroke-width="2.5" filter="url(#neonGlow)" />

  <!-- Email Icon -->
  <path class="icon" d="M 25 18 L 45 18 C 46 18 47 19 47 20 L 47 32 C 47 33 46 34 45 34 L 25 34 C 24 34 23 33 23 32 L 23 20 C 23 19 24 18 25 18 Z M 26 21 L 35 27 L 44 21 Z" />

  <!-- Texts -->
  <text x="60" y="23" class="btn-text-primary">EMAIL TERMINAL</text>
  <text x="60" y="37" class="btn-text-secondary">ydv.nitin2401@gmail.com</text>
</svg>
