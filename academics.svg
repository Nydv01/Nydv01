<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 180" width="830" height="180">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="dbBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1013" />
      <stop offset="100%" stop-color="#050607" />
    </linearGradient>

    <!-- Orange Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;display=swap');

    .board-bg {
      stroke: #ff6a00;
      stroke-width: 1;
      stroke-opacity: 0.25;
      fill: url(#dbBg);
    }

    .title-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 900;
      fill: #ff6a00;
      letter-spacing: 2px;
      filter: url(#neonGlow);
    }

    .subtitle-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 900;
      fill: #ffffff;
      letter-spacing: 2px;
    }

    .text-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      font-weight: 700;
      fill: #64748b;
      letter-spacing: 1px;
    }

    .text-primary {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #f8fafc;
      font-weight: bold;
    }

    .text-secondary {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      fill: #64748b;
    }

    .stat-val {
      fill: #ff6a00;
      font-weight: bold;
    }

    .divider {
      stroke: #ff6a00;
      stroke-opacity: 0.15;
      stroke-dasharray: 4 4;
    }

    .panel-frame {
      fill: #0c101d;
      fill-opacity: 0.3;
      stroke: #ff6a00;
      stroke-opacity: 0.1;
    }
  </style>

  <!-- Frame Background -->
  <rect class="board-bg" x="15" y="15" width="800" height="150" rx="6" />

  <!-- Corner indicators -->
  <path d="M 15 35 L 15 15 L 35 15" fill="none" stroke="#ff6a00" stroke-width="2" filter="url(#neonGlow)" />
  <path d="M 815 145 L 815 165 L 795 165" fill="none" stroke="#ff6a00" stroke-width="2" filter="url(#neonGlow)" />

  <!-- Section Title -->
  <text x="40" y="38" class="title-text">🎓 ACADEMIC TELEMETRY &amp; CREDENTIALS</text>

  <!-- COLUMN 1: VIT BHOPAL B.TECH (Left) -->
  <g transform="translate(35, 55)">
    <rect class="panel-frame" x="0" y="0" width="240" height="90" rx="3" />
    <text x="12" y="18" class="text-title">UNIVERSITY NODE</text>
    <text x="12" y="36" class="text-primary">VIT Bhopal University</text>
    <text x="12" y="52" class="text-secondary">B.Tech - Computer Science (CSE Core)</text>
    <text x="12" y="68" class="text-secondary">Timeline: 2023 – 2027</text>
    <text x="12" y="80" class="text-primary">CGPA: <tspan class="stat-val">8.86 / 10.0</tspan></text>
  </g>

  <!-- Divider 1 -->
  <line class="divider" x1="295" y1="55" x2="295" y2="145" />

  <!-- COLUMN 2: SCHOOLING CBSE (Center) -->
  <g transform="translate(315, 55)">
    <rect class="panel-frame" x="0" y="0" width="200" height="90" rx="3" />
    <text x="12" y="18" class="text-title">SECONDARY EDUCATION</text>
    <text x="12" y="36" class="text-primary">CBSE Boards (Haryana)</text>
    <text x="12" y="55" class="text-secondary">Class XII (PCM): <tspan class="stat-val">80.3%</tspan></text>
    <text x="12" y="75" class="text-secondary">Class X General: <tspan class="stat-val">89.4%</tspan></text>
  </g>

  <!-- Divider 2 -->
  <line class="divider" x1="535" y1="55" x2="535" y2="145" />

  <!-- COLUMN 3: GOOGLE CERTIFICATIONS (Right) -->
  <g transform="translate(555, 55)">
    <rect class="panel-frame" x="0" y="0" width="240" height="90" rx="3" />
    <text x="12" y="18" class="text-title">ACTIVE CERTIFICATIONS</text>
    <text x="12" y="36" class="text-primary">• Google Cybersecurity (2025)</text>
    <text x="12" y="52" class="text-primary">• Google Generative AI (2025)</text>
    <text x="12" y="68" class="text-primary">• Industrial IoT Markets (2025)</text>
    <text x="12" y="82" class="text-secondary">Credentials verified via Credly</text>
  </g>
</svg>
