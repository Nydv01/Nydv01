<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 180" width="830" height="180">
  <defs>
    <!-- Card Elevate Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>

    <!-- Frosted Border Gradient -->
    <linearGradient id="frostBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#242426" />
    </linearGradient>

    <!-- Subtle Shadows -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&amp;display=swap');

    .board-bg {
      fill: #09090b;
    }

    .widget-card {
      fill: url(#cardGrad);
      stroke: url(#frostBorder);
      stroke-width: 1;
      filter: url(#softShadow);
    }

    .section-title {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-weight: 700;
      font-size: 13px;
      fill: #ffffff;
      letter-spacing: 0.5px;
    }

    .card-lbl {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 9px;
      fill: #8e8e93;
      letter-spacing: 0.5px;
    }

    .card-val {
      font-family: 'Outfit', -apple-system, sans-serif;
      font-weight: 700;
      font-size: 15px;
      fill: #ffffff;
    }

    .card-desc {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      fill: #8e8e93;
      line-height: 1.4;
    }

    .accent-gold {
      fill: #dfc39a;
    }
  </style>

  <!-- Background Base -->
  <rect class="board-bg" width="100%" height="100%" rx="16" />

  <!-- Section Title -->
  <text x="30" y="38" class="section-title">🎓 CREDENTIALS &amp; ACADEMICS</text>

  <!-- 3 Elevated Panels in Apple Row Layout -->

  <!-- PANEL 1: VIT Bhopal -->
  <g transform="translate(20, 50)">
    <rect class="widget-card" width="250" height="110" rx="12" />
    <text x="16" y="24" class="card-lbl">UNIVERSITY NODE</text>
    <text x="16" y="44" class="card-val">VIT Bhopal University</text>
    
    <text x="16" y="68" class="card-desc">B.Tech - Computer Science (CSE Core)</text>
    <text x="16" y="84" class="card-desc">Timeline: 2023 – 2027</text>
    <text x="16" y="98" class="card-val accent-gold">CGPA: 8.86 / 10.0</text>
  </g>

  <!-- PANEL 2: Schooling -->
  <g transform="translate(285, 50)">
    <rect class="widget-card" width="230" height="110" rx="12" />
    <text x="16" y="24" class="card-lbl">SECONDARY BOARDS</text>
    <text x="16" y="44" class="card-val">CBSE Schooling</text>
    
    <text x="16" y="68" class="card-desc">Class XII (PCM): <tspan fill="#ffffff" font-weight="bold">80.3%</tspan></text>
    <text x="16" y="86" class="card-desc">Class X General: <tspan fill="#ffffff" font-weight="bold">89.4%</tspan></text>
    <text x="16" y="98" class="card-desc">State Node: Haryana, India</text>
  </g>

  <!-- PANEL 3: Certifications -->
  <g transform="translate(530, 50)">
    <rect class="widget-card" width="280" height="110" rx="12" />
    <text x="16" y="24" class="card-lbl">ACTIVE CERTIFICATIONS</text>
    
    <text x="16" y="44" class="card-desc" fill="#ffffff" font-weight="bold">• Google Cybersecurity (2025)</text>
    <text x="16" y="62" class="card-desc" fill="#ffffff" font-weight="bold">• Google Generative AI (2025)</text>
    <text x="16" y="80" class="card-desc" fill="#ffffff" font-weight="bold">• Industrial IoT Markets &amp; Security</text>
    <text x="16" y="96" class="card-desc">Verified via Credly Authority</text>
  </g>
</svg>
