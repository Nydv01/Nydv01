<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 50" width="250" height="50">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="btnBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>

    <!-- Frosted Border Gradient -->
    <linearGradient id="frostBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#242426" />
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&amp;display=swap');
    
    .btn-border {
      stroke: url(#frostBorder);
      stroke-width: 1;
      fill: url(#btnBg);
    }

    .btn-text-primary {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 11px;
      fill: #ffffff;
      letter-spacing: 1px;
    }

    .btn-text-secondary {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 10px;
      fill: #8e8e93;
    }

    .icon {
      fill: #c5a880; /* Apple Pro Gold */
    }
  </style>

  <!-- Button Frame -->
  <rect class="btn-border" x="1" y="1" width="248" height="48" rx="10" />

  <!-- Phone Icon -->
  <path class="icon" d="M 25 20 C 25 19 26 18 27 18 L 31 18 C 32 18 33 19 33 20 L 35 24 C 35 25 34 26 33 26 L 31 27 C 32 29 33 30 35 32 L 36 30 C 37 29 38 29 39 29 L 43 31 C 44 31 45 32 45 33 L 45 37 C 45 38 44 39 43 39 C 33 39 25 31 25 21 Z" />

  <!-- Texts -->
  <text x="60" y="22" class="btn-text-primary">MOBILE VOICE</text>
  <text x="60" y="36" class="btn-text-secondary">+91 86850 69281</text>
</svg>
