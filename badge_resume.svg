<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 50" width="250" height="50">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="btnBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>

    <!-- Frosted Border Gradient -->
    <linearGradient id="frostBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#242426" />
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&amp;display=swap');
    
    .btn-border {
      stroke: url(#frostBorder);
      stroke-width: 1;
      fill: url(#btnBg);
    }

    .btn-text-primary {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 11px;
      fill: #ffffff;
      letter-spacing: 1px;
    }

    .btn-text-secondary {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 10px;
      fill: #8e8e93;
    }

    .icon {
      fill: #c5a880; /* Apple Pro Gold */
    }
  </style>

  <!-- Button Frame -->
  <rect class="btn-border" x="1" y="1" width="248" height="48" rx="10" />

  <!-- Document/PDF Icon -->
  <path class="icon" d="M 25 18 L 41 18 L 47 24 L 47 38 C 47 39 46 40 45 40 L 25 40 C 24 40 23 39 23 38 L 23 20 C 23 19 24 18 25 18 Z M 40 19 L 40 24 L 46 24 Z" />

  <!-- Texts -->
  <text x="60" y="22" class="btn-text-primary">PDF RESUME DOWNLOAD</text>
  <text x="60" y="36" class="btn-text-secondary">Click to Access File</text>
</svg>
