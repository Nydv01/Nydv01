<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 200" width="830" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1013" />
      <stop offset="100%" stop-color="#050607" />
    </linearGradient>

    <!-- Elevated Panel Color -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>

    <!-- Frosted Border Gradient -->
    <linearGradient id="frostBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#242426" />
    </linearGradient>

    <!-- Soft Shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&amp;family=SF+Pro+Text&amp;display=swap');

    .card-border {
      stroke: url(#frostBorder);
      stroke-width: 1;
      fill: url(#panelGrad);
      filter: url(#softShadow);
    }

    .project-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 18px;
      fill: #ffffff;
      letter-spacing: 2px;
    }

    .project-subtitle {
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 11px;
      fill: #c5a880;
      letter-spacing: 1px;
    }

    .desc-text {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      fill: #e5e7eb;
    }

    .badge-rect {
      fill: #2c2c2e;
      stroke: #3a3a3c;
      stroke-width: 1;
    }

    .badge-text {
      font-family: 'Outfit', sans-serif;
      font-size: 9px;
      fill: #ffffff;
      text-anchor: middle;
    }

    /* Radar / Location Circle Animation */
    .radar-circle {
      stroke: #c5a880;
      stroke-width: 1;
      stroke-opacity: 0.25;
      fill: none;
    }

    .radar-circle-pulse {
      stroke: #c5a880;
      stroke-width: 1.5;
      fill: none;
      animation: mapPing 3s infinite ease-out;
      transform-origin: 670px 90px;
    }

    @keyframes mapPing {
      0% { r: 10px; opacity: 1; }
      100% { r: 40px; opacity: 0; }
    }
  </style>

  <!-- Card Frame -->
  <rect class="card-border" x="15" y="15" width="800" height="170" rx="12" />

  <!-- Left: Content details -->
  <g transform="translate(45, 45)">
    <text class="project-title">NEXUS CAMPUS</text>
    <text x="145" y="-4" class="project-subtitle">[ UNIVERSITY CAMPUS SUPER APP ]</text>

    <text x="0" y="28" class="desc-text">• Centralized university course reviews, study groups, and student trading.</text>
    <text x="0" y="46" class="desc-text">• Secure student verification engine via Supabase RLS and JWT guards.</text>
    <text x="0" y="64" class="desc-text">• Built interactive campus map pins displaying localized events via Leaflet.</text>

    <!-- Badges -->
    <g transform="translate(0, 88)">
      <rect class="badge-rect" x="0" y="0" width="60" height="18" rx="3" />
      <text class="badge-text" x="30" y="12">REACT</text>

      <rect class="badge-rect" x="70" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="105" y="12">FASTAPI</text>

      <rect class="badge-rect" x="150" y="0" width="80" height="18" rx="3" />
      <text class="badge-text" x="190" y="12">POSTGRES</text>

      <rect class="badge-rect" x="240" y="0" width="80" height="18" rx="3" />
      <text class="badge-text" x="280" y="12">SUPABASE</text>

      <rect class="badge-rect" x="330" y="0" width="75" height="18" rx="3" />
      <text class="badge-text" x="367.5" y="12">LEAFLET</text>
    </g>
  </g>

  <!-- Right: Campus Map Radar HUD visualizer -->
  <line x1="560" y1="30" x2="560" y2="170" stroke="#3a3a3c" stroke-width="1" stroke-opacity="0.5" />

  <g transform="translate(565, 30)">
    <rect x="15" y="10" width="210" height="120" rx="6" fill="#09090b" fill-opacity="0.5" stroke="#3a3a3c" stroke-width="1" />
    <circle cx="120" cy="70" r="25" class="radar-circle" />
    <circle cx="120" cy="70" r="10" class="radar-circle" />
    <circle class="radar-circle-pulse" cx="120" cy="70" r="15" />
    <!-- Pin -->
    <circle cx="120" cy="70" r="4" fill="#ffffff" />
  </g>
</svg>
