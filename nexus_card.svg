<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 200" width="830" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c16" />
      <stop offset="100%" stop-color="#020306" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="cyanGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="purpleGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;display=swap');

    .card-border {
      stroke: #00f0ff;
      stroke-width: 1.5;
      stroke-opacity: 0.25;
      fill: url(#cardBg);
    }

    .project-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 18px;
      fill: #ffffff;
      letter-spacing: 2px;
    }

    .project-title-glow {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 18px;
      fill: #00f0ff;
      letter-spacing: 2px;
      opacity: 0.85;
      filter: url(#cyanGlow);
    }

    .project-subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #00f0ff;
      letter-spacing: 1px;
    }

    .desc-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      fill: #94a3b8;
    }

    .badge-rect {
      fill: #0c101d;
      stroke: #00f0ff;
      stroke-opacity: 0.3;
      stroke-dasharray: 4 2;
    }

    .badge-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      fill: #e2e8f0;
      text-anchor: middle;
    }

    /* Radar/Campus Grid Animation */
    .radar-circle {
      stroke: #00f0ff;
      stroke-width: 1;
      stroke-opacity: 0.25;
      fill: none;
    }

    .radar-circle-pulse {
      stroke: #00f0ff;
      stroke-width: 1.5;
      fill: none;
      animation: mapPing 3s infinite ease-out;
      transform-origin: 670px 90px;
    }

    @keyframes mapPing {
      0% { r: 10px; opacity: 1; }
      100% { r: 40px; opacity: 0; }
    }

    .grid-lines {
      stroke: #00f0ff;
      stroke-width: 0.5;
      stroke-opacity: 0.15;
    }

    .campus-pin {
      fill: #9e00ff;
      filter: url(#purpleGlow);
      animation: pinBounce 2s infinite ease-in-out;
    }

    @keyframes pinBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  </style>

  <!-- Card Frame -->
  <rect class="card-border" x="15" y="15" width="800" height="170" rx="6" />

  <!-- Side Accent Corner Brackets -->
  <path d="M 15,35 L 15,15 L 35,15" fill="none" stroke="#00f0ff" stroke-width="3" filter="url(#cyanGlow)" />
  <path d="M 815,145 L 815,165 L 795,165" fill="none" stroke="#00f0ff" stroke-width="3" filter="url(#cyanGlow)" />

  <!-- Left: Project Descriptions -->
  <g transform="translate(45, 45)">
    <text class="project-title-glow">NEXUS CAMPUS</text>
    <text class="project-title">NEXUS CAMPUS</text>
    <text x="145" y="5" class="project-subtitle">[ UNIVERSITY CAMPUS SUPER APP ]</text>

    <text x="0" y="32" class="desc-text">• Centralized university course reviews, study groups, and student trading.</text>
    <text x="0" y="50" class="desc-text">• Secure student verification engine via Supabase RLS and JWT guards.</text>
    <text x="0" y="68" class="desc-text">• Built interactive campus map pins displaying localized events via Leaflet.</text>

    <!-- Badges -->
    <g transform="translate(0, 88)">
      <rect class="badge-rect" x="0" y="0" width="60" height="18" rx="3" />
      <text class="badge-text" x="30" y="12">REACT</text>

      <rect class="badge-rect" x="70" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="105" y="12">FASTAPI</text>

      <rect class="badge-rect" x="150" y="0" width="80" height="18" rx="3" />
      <text class="badge-text" x="190" y="12">POSTGRES</text>

      <rect class="badge-rect" x="240" y="0" width="80" height="18" rx="3" />
      <text class="badge-text" x="280" y="12">SUPABASE</text>

      <rect class="badge-rect" x="330" y="0" width="75" height="18" rx="3" />
      <text class="badge-text" x="367.5" y="12">LEAFLET</text>
    </g>
  </g>

  <!-- Right: Campus Map Radar HUD visualizer -->
  <line x1="560" y1="30" x2="560" y2="170" stroke="#00f0ff" stroke-opacity="0.15" stroke-dasharray="5 5" />

  <!-- Live Map / Event Tracker Simulation -->
  <g transform="translate(565, 30)">
    <!-- Outer Box frame -->
    <rect x="15" y="10" width="210" height="120" rx="3" fill="#050811" fill-opacity="0.5" stroke="#00f0ff" stroke-opacity="0.1" />

    <!-- Campus Geolocation Grid -->
    <g>
      <!-- Grid cross sections -->
      <line class="grid-lines" x1="120" y1="10" x2="120" y2="130" />
      <line class="grid-lines" x1="20" y1="70" x2="220" y2="70" />
      
      <line class="grid-lines" x1="70" y1="10" x2="70" y2="130" />
      <line class="grid-lines" x1="170" y1="10" x2="170" y2="130" />
      <line class="grid-lines" x1="20" y1="40" x2="220" y2="40" />
      <line class="grid-lines" x1="20" y1="100" x2="220" y2="100" />

      <!-- Map Radar Rings -->
      <circle cx="120" cy="70" r="25" class="radar-circle" />
      <circle cx="120" cy="70" r="10" class="radar-circle" />
      <circle class="radar-circle-pulse" cx="120" cy="70" r="15" />

      <!-- Map Pin (Pulsing / Bouncing) -->
      <g transform="translate(120, 70)" class="campus-pin">
        <!-- Pin path -->
        <path d="M 0,0 C -5,-8 -10,-12 -10,-20 C -10,-28 -2,-32 5,-32 C 12,-32 20,-28 20,-20 C 20,-12 15,-8 10,0 Z" scale="0.5" fill="#9e00ff" />
        <circle cx="5" cy="-20" r="4" fill="#00f0ff" />
      </g>
    </g>

    <!-- Map Label -->
    <text x="25" y="120" font-family="'Share Tech Mono', monospace" font-size="8" fill="#00f0ff" font-weight="bold">MAP_RESOLVER: CAMPUS_PULSE_ACTIVE</text>
  </g>
</svg>
