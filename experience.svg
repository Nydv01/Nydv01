<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 540" width="830" height="540">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="expBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c" />
      <stop offset="100%" stop-color="#020203" />
    </linearGradient>

    <!-- Elevated Panel Color -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>

    <!-- Frosted Border Gradient -->
    <linearGradient id="frostBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#242426" />
    </linearGradient>

    <!-- Soft Shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&amp;family=SF+Pro+Text&amp;display=swap');

    .board-bg {
      fill: url(#expBg);
    }

    .timeline-axis {
      stroke: #3a3a3c;
      stroke-width: 1.5;
    }

    .exp-node {
      fill: #1c1c1e;
      stroke: #c5a880;
      stroke-width: 1.5;
    }

    .exp-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 13px;
      fill: #ffffff;
      letter-spacing: 0.5px;
    }

    .exp-company {
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 11px;
      fill: #c5a880;
      letter-spacing: 0.5px;
    }

    .exp-date {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 10px;
      fill: #8e8e93;
    }

    .bullet-point {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      fill: #e5e7eb;
    }

    .highlight-gold { fill: #c5a880; font-weight: bold; }

    /* Box panels */
    .panel-box {
      fill: url(#panelGrad);
      stroke: url(#frostBorder);
      stroke-width: 1;
      filter: url(#softShadow);
    }
  </style>

  <!-- Background Board -->
  <rect class="board-bg" width="100%" height="100%" rx="16" />

  <!-- Title -->
  <text x="40" y="42" font-family="'Outfit', sans-serif" font-size="12" fill="#ffffff" font-weight="700" letter-spacing="0.5">💼 PROFESSIONAL TIMELINE</text>

  <!-- Timeline Axis Line -->
  <line class="timeline-axis" x1="65" y1="80" x2="65" y2="480" />

  <!-- SECTION 1: Frigoglass (Nov 2025 - Jan 2026) -->
  <g transform="translate(0, 80)">
    <!-- Timeline Node -->
    <circle class="exp-node" cx="65" cy="30" r="5" />

    <!-- Container Panel -->
    <rect class="panel-box" x="90" y="5" width="705" height="110" rx="12" />

    <!-- Content Header -->
    <text x="110" y="27" class="exp-title">⚙️ SOFTWARE ENGINEERING INTERN</text>
    <text x="110" y="44" class="exp-company">Frigoglass India Pvt. Ltd. <tspan class="exp-date">| Nov 2025 – Jan 2026 (Gurugram, IN)</tspan></text>

    <!-- Details -->
    <text x="110" y="65" class="bullet-point">• Optimized Postgres indices &amp; FastAPI/Express APIs: <tspan class="highlight-gold">20% query latency reduction</tspan>.</text>
    <text x="110" y="80" class="bullet-point">• Engineered Django microservices with Pydantic validation: <tspan class="highlight-gold">Mitigated OWASP Top 10 vulnerabilities</tspan>.</text>
    <text x="110" y="95" class="bullet-point">• Bridged high-throughput React frontends with Supabase DB for the Nexus Campus platform.</text>
    <text x="110" y="110" class="bullet-point">• Containerized Postman testing suites inside Docker pipelines: <tspan class="highlight-gold">30% reduction in QA overhead</tspan>.</text>
  </g>

  <!-- SECTION 2: Panaversal Technologies -->
  <g transform="translate(0, 215)">
    <!-- Timeline Node -->
    <circle class="exp-node" cx="65" cy="30" r="5" />

    <!-- Container Panel -->
    <rect class="panel-box" x="90" y="5" width="705" height="95" rx="12" />

    <!-- Content Header -->
    <text x="110" y="27" class="exp-title">🎨 FRONTEND DEVELOPER INTERN</text>
    <text x="110" y="44" class="exp-company">Panaversal Technologies <tspan class="exp-date">| Internship Node</tspan></text>

    <!-- Details -->
    <text x="110" y="65" class="bullet-point">• Built modular, optimized React/TypeScript component grids: <tspan class="highlight-gold">15% Lighthouse performance gain</tspan>.</text>
    <text x="110" y="80" class="bullet-point">• Integrated Zustand state systems: Fulfilling <tspan class="highlight-gold">sub-100ms client-side state synchronization</tspan>.</text>
    <text x="110" y="95" class="bullet-point">• Programmed interactive web transitions &amp; animations using GSAP and Framer Motion.</text>
  </g>

  <!-- SECTION 3: Independent Developer -->
  <g transform="translate(0, 335)">
    <!-- Timeline Node -->
    <circle class="exp-node" cx="65" cy="30" r="5" />

    <!-- Container Panel -->
    <rect class="panel-box" x="90" y="5" width="705" height="95" rx="12" />

    <!-- Content Header -->
    <text x="110" y="27" class="exp-title">🚀 INDEPENDENT FULL-STACK DEVELOPER</text>
    <text x="110" y="44" class="exp-company">Freelance Engineering <tspan class="exp-date">| 2023 – Present (Remote Node)</tspan></text>

    <!-- Details -->
    <text x="110" y="65" class="bullet-point">• Architected &amp; deployed <tspan class="highlight-gold">12+ production-grade web apps</tspan> &amp; custom GenAI agents (Next.js, FastAPI, Node).</text>
    <text x="110" y="80" class="bullet-point">• Wired JWT/OAuth 2.0 security schemes with Role-Based Access Control (RBAC) &amp; Stripe billing.</text>
    <text x="110" y="95" class="bullet-point">• Configured containerized Docker deployment matrices across AWS, Vercel, and Render clusters.</text>
  </g>
</svg>
