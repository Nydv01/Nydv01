<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 200" width="830" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1013" />
      <stop offset="100%" stop-color="#050607" />
    </linearGradient>

    <!-- Elevated Panel Color -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>

    <!-- Frosted Border Gradient -->
    <linearGradient id="frostBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#242426" />
    </linearGradient>

    <!-- Soft Shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&amp;family=SF+Pro+Text&amp;display=swap');

    .card-border {
      stroke: url(#frostBorder);
      stroke-width: 1;
      fill: url(#panelGrad);
      filter: url(#softShadow);
    }

    .project-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 18px;
      fill: #ffffff;
      letter-spacing: 2px;
    }

    .project-subtitle {
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 11px;
      fill: #c5a880;
      letter-spacing: 1px;
    }

    .desc-text {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      fill: #e5e7eb;
    }

    .badge-rect {
      fill: #2c2c2e;
      stroke: #3a3a3c;
      stroke-width: 1;
    }

    .badge-text {
      font-family: 'Outfit', sans-serif;
      font-size: 9px;
      fill: #ffffff;
      text-anchor: middle;
    }

    /* Waveform Animation */
    .shader-wave {
      fill: none;
      stroke: #c5a880;
      stroke-width: 1.5;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: waveMove 3s linear infinite;
    }

    .shader-wave-secondary {
      fill: none;
      stroke: #8e8e93;
      stroke-width: 1;
      stroke-dasharray: 80;
      stroke-dashoffset: 80;
      animation: waveMove 2.5s linear infinite reverse;
    }

    @keyframes waveMove {
      0% { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }
  </style>

  <!-- Card Frame -->
  <rect class="card-border" x="15" y="15" width="800" height="170" rx="12" />

  <!-- Left: Project Descriptions -->
  <g transform="translate(45, 45)">
    <text class="project-title">PROPOSAL</text>
    <text x="120" y="-4" class="project-subtitle">[ CINEMATIC THREE.JS EXPERIENCE ]</text>

    <text x="0" y="28" class="desc-text">• Premium 3D shaders, custom GLSL vertices, and mathematical particles.</text>
    <text x="0" y="46" class="desc-text">• Highly interactive audio synthesized and scheduled in real-time via Tone.js.</text>
    <text x="0" y="64" class="desc-text">• Fluid scrolling transitions &amp; animations powered by GSAP and ScrollTrigger.</text>

    <!-- Badges -->
    <g transform="translate(0, 88)">
      <rect class="badge-rect" x="0" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="35" y="12">THREE.JS</text>

      <rect class="badge-rect" x="80" y="0" width="105" height="18" rx="3" />
      <text class="badge-text" x="52.5" y="12" transform="translate(80, 0)">GLSL SHADERS</text>

      <rect class="badge-rect" x="195" y="0" width="60" height="18" rx="3" />
      <text class="badge-text" x="225" y="12">GSAP</text>

      <rect class="badge-rect" x="265" y="0" width="65" height="18" rx="3" />
      <text class="badge-text" x="297.5" y="12">TONE.JS</text>

      <rect class="badge-rect" x="340" y="0" width="60" height="18" rx="3" />
      <text class="badge-text" x="370" y="12">VITE</text>
    </g>
  </g>

  <!-- Right: Waveform HUD visualizer -->
  <line x1="560" y1="30" x2="560" y2="170" stroke="#3a3a3c" stroke-width="1" stroke-opacity="0.5" />

  <g transform="translate(565, 30)">
    <rect x="15" y="10" width="210" height="120" rx="6" fill="#09090b" fill-opacity="0.5" stroke="#3a3a3c" stroke-width="1" />
    <path class="shader-wave" d="M 30,70 Q 55,20 85,85 T 145,55 T 195,70" />
    <path class="shader-wave-secondary" d="M 30,70 Q 60,110 100,55 T 160,85 T 195,70" />
  </g>
</svg>
