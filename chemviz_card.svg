<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 200" width="830" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1211" />
      <stop offset="100%" stop-color="#020405" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="tealGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Tiny grid pattern -->
    <pattern id="graphGrid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#00ffcc" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;display=swap');

    .card-border {
      stroke: #00ffcc;
      stroke-width: 1.5;
      stroke-opacity: 0.25;
      fill: url(#cardBg);
    }

    .project-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 18px;
      fill: #ffffff;
      letter-spacing: 2px;
    }

    .project-title-glow {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 18px;
      fill: #00ffcc;
      letter-spacing: 2px;
      opacity: 0.85;
      filter: url(#tealGlow);
    }

    .project-subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #00ffcc;
      letter-spacing: 1px;
    }

    .desc-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      fill: #94a3b8;
    }

    .badge-rect {
      fill: #0c101d;
      stroke: #00ffcc;
      stroke-opacity: 0.3;
      stroke-dasharray: 4 2;
    }

    .badge-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      fill: #e2e8f0;
      text-anchor: middle;
    }

    /* Waveform telemetry chart animation */
    .telemetry-line {
      fill: none;
      stroke: #00ffcc;
      stroke-width: 1.5;
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: sweepGraph 3s linear infinite;
    }

    .telemetry-line-secondary {
      fill: none;
      stroke: #9e00ff;
      stroke-width: 1.5;
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: sweepGraph 4s linear infinite reverse;
    }

    @keyframes sweepGraph {
      0% { stroke-dashoffset: 200; }
      50% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -200; }
    }

    /* Dial gauge rotation */
    .gauge-rotator {
      transform-origin: 200px 70px;
      animation: rotateDial 8s linear infinite;
    }

    @keyframes rotateDial {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Card Frame -->
  <rect class="card-border" x="15" y="15" width="800" height="170" rx="6" />

  <!-- Side Accent Corner Brackets -->
  <path d="M 15,35 L 15,15 L 35,15" fill="none" stroke="#00ffcc" stroke-width="3" filter="url(#tealGlow)" />
  <path d="M 815,145 L 815,165 L 795,165" fill="none" stroke="#00ffcc" stroke-width="3" filter="url(#tealGlow)" />

  <!-- Left: Content details -->
  <g transform="translate(45, 45)">
    <text class="project-title-glow">CHEMVIZ ANALYTICS</text>
    <text class="project-title">CHEMVIZ ANALYTICS</text>
    <text x="210" y="5" class="project-subtitle">[ INDUSTRIAL EQUIPMENT DIAGNOSTICS LAB ]</text>

    <text x="0" y="32" class="desc-text">• Full-stack equipment analytics platform processing operational dataset CSVs.</text>
    <text x="0" y="50" class="desc-text">• Secure session-based auth and high-throughput pandas-based ETL pipelines.</text>
    <text x="0" y="68" class="desc-text">• Interactive real-time metrics dashboards with automated professional PDF reporter.</text>

    <!-- Badges -->
    <g transform="translate(0, 88)">
      <rect class="badge-rect" x="0" y="0" width="60" height="18" rx="3" />
      <text class="badge-text" x="30" y="12">REACT</text>

      <rect class="badge-rect" x="70" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="105" y="12">FASTAPI</text>

      <rect class="badge-rect" x="150" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="185" y="12">PANDAS</text>

      <rect class="badge-rect" x="230" y="0" width="75" height="18" rx="3" />
      <text class="badge-text" x="267.5" y="12">CHART.JS</text>

      <rect class="badge-rect" x="315" y="0" width="75" height="18" rx="3" />
      <text class="badge-text" x="352.5" y="12">PDF-GEN</text>
    </g>
  </g>

  <!-- Right: Chemical HUD diagnostics visualizer -->
  <line x1="560" y1="30" x2="560" y2="170" stroke="#00ffcc" stroke-opacity="0.15" stroke-dasharray="5 5" />

  <!-- Industrial Diagnostics Cockpit Screen -->
  <g transform="translate(565, 30)">
    <!-- Base screen outline -->
    <rect x="15" y="10" width="210" height="120" rx="3" fill="#050a09" fill-opacity="0.5" stroke="#00ffcc" stroke-opacity="0.1" />

    <!-- Grid Layout background -->
    <rect x="25" y="18" width="130" height="70" fill="url(#graphGrid)" />

    <!-- Wave Plotting Graph -->
    <g fill="none">
      <path class="telemetry-line" d="M 25,53 Q 50,23 80,63 T 130,33 T 155,53" />
      <path class="telemetry-line-secondary" d="M 25,53 Q 50,73 90,33 T 125,63 T 155,53" />
    </g>

    <!-- Dial telemetry gauge -->
    <g transform="translate(0, 0)">
      <!-- Outer ring -->
      <circle cx="185" cy="53" r="16" fill="none" stroke="#00ffcc" stroke-opacity="0.15" />
      <circle cx="185" cy="53" r="12" fill="none" stroke="#00ffcc" stroke-opacity="0.2" stroke-dasharray="6 4" class="gauge-rotator" />
      <circle cx="185" cy="53" r="3" fill="#00ffcc" filter="url(#tealGlow)" />
    </g>

    <!-- Numerical parameter variables -->
    <text x="25" y="102" font-family="'Share Tech Mono', monospace" font-size="8" fill="#64748b">TEMP: <tspan fill="#00ffcc">342.15 K</tspan></text>
    <text x="110" y="102" font-family="'Share Tech Mono', monospace" font-size="8" fill="#64748b">PRES: <tspan fill="#9e00ff">12.45 MPa</tspan></text>

    <!-- Diagnostics title -->
    <text x="25" y="120" font-family="'Share Tech Mono', monospace" font-size="8" fill="#00ffcc" font-weight="bold">DIAG_SYS: FLOW_ANALYZER_ONLINE</text>
  </g>
</svg>
