<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 200" width="830" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1211" />
      <stop offset="100%" stop-color="#030708" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="tealGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid pattern for graph -->
    <pattern id="graphGrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#00ffcc" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&amp;family=Share+Tech+Mono&amp;display=swap');

    .card-border {
      stroke: #00ffcc;
      stroke-width: 1.5;
      stroke-opacity: 0.25;
      fill: url(#cardBg);
    }

    .project-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 18px;
      fill: #ffffff;
      letter-spacing: 2px;
    }

    .project-title-glow {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 18px;
      fill: #00ffcc;
      letter-spacing: 2px;
      opacity: 0.8;
      filter: url(#tealGlow);
    }

    .project-subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #00ffcc;
      letter-spacing: 1px;
    }

    .desc-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      fill: #a0aec0;
    }

    .badge-rect {
      fill: #1a202c;
      stroke: #718096;
      stroke-opacity: 0.3;
      stroke-dasharray: 4 2;
    }

    .badge-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      fill: #a0aec0;
      text-anchor: middle;
    }

    /* Graph Line Drawing Animation */
    .graph-line {
      fill: none;
      stroke: #00ffcc;
      stroke-width: 2;
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: drawGraph 4s linear infinite;
    }

    @keyframes drawGraph {
      0% { stroke-dashoffset: 300; }
      50% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -300; }
    }

    .graph-dot {
      fill: #00ffcc;
      filter: url(#tealGlow);
      animation: pulseDot 2s infinite;
    }

    @keyframes pulseDot {
      0%, 100% { r: 3px; opacity: 0.5; }
      50% { r: 6px; opacity: 1; }
    }
  </style>

  <!-- Card Frame -->
  <rect class="card-border" x="15" y="15" width="800" height="170" rx="6" />

  <!-- Accent Tech Corner Elements -->
  <!-- Top Left -->
  <path d="M 15 35 L 15 15 L 35 15" fill="none" stroke="#00ffcc" stroke-width="3" filter="url(#tealGlow)" />
  <!-- Bottom Right -->
  <path d="M 815 145 L 815 165 L 795 165" fill="none" stroke="#00ffcc" stroke-width="3" filter="url(#tealGlow)" />

  <!-- Left: Content details -->
  <g transform="translate(45, 45)">
    <!-- Title with Glow -->
    <text x="0" y="5" class="project-title-glow">CHEMVIZ ANALYTICS</text>
    <text x="0" y="5" class="project-title">CHEMVIZ ANALYTICS</text>
    <text x="210" y="5" class="project-subtitle">[ INDUSTRIAL EQUIPMENT DATA LAB ]</text>

    <!-- Description -->
    <text x="0" y="32" class="desc-text">• Full-stack chemical equipment diagnostics and operations reporter from CSVs.</text>
    <text x="0" y="50" class="desc-text">• Secure session auth with pandas-based high-throughput ETL data ingestion.</text>
    <text x="0" y="68" class="desc-text">• Interactive real-time analytics graphs with professional automated PDF reporter.</text>

    <!-- Badges -->
    <g transform="translate(0, 88)">
      <!-- React -->
      <rect class="badge-rect" x="0" y="0" width="60" height="18" rx="3" />
      <text class="badge-text" x="30" y="12">REACT</text>

      <!-- FastAPI -->
      <rect class="badge-rect" x="70" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="105" y="12">FASTAPI</text>

      <!-- Pandas -->
      <rect class="badge-rect" x="150" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="185" y="12">PANDAS</text>

      <!-- Chart.js -->
      <rect class="badge-rect" x="230" y="0" width="75" height="18" rx="3" />
      <text class="badge-text" x="267.5" y="12">CHART.JS</text>

      <!-- PDF Gen -->
      <rect class="badge-rect" x="315" y="0" width="75" height="18" rx="3" />
      <text class="badge-text" x="352.5" y="12">PDF-GEN</text>
    </g>
  </g>

  <!-- Right Side: Graphic Chart HUD visualizer -->
  <line x1="560" y1="30" x2="560" y2="170" stroke="#00ffcc" stroke-opacity="0.1" stroke-dasharray="5 5" />

  <!-- Graph Analytics HUD -->
  <g transform="translate(580, 45)">
    <!-- Background grid -->
    <rect x="0" y="0" width="180" height="100" fill="url(#graphGrid)" stroke="#00ffcc" stroke-opacity="0.1" />
    
    <!-- Graph path -->
    <path class="graph-line" d="M 0 80 Q 30 20 60 70 T 120 30 T 180 50" />

    <!-- Scanning line indicators -->
    <line x1="0" y1="50" x2="180" y2="50" stroke="#00ffcc" stroke-opacity="0.1" stroke-dasharray="2 2" />

    <!-- Pulse nodes on graph points -->
    <circle class="graph-dot" cx="30" cy="50" r="4" />
    <circle class="graph-dot" cx="90" cy="50" r="4" />
    <circle class="graph-dot" cx="150" cy="40" r="4" />
  </g>
</svg>
