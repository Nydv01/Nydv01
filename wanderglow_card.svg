<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 200" width="830" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1312" />
      <stop offset="100%" stop-color="#040608" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&amp;family=Share+Tech+Mono&amp;display=swap');

    .card-border {
      stroke: #ffa500;
      stroke-width: 1.5;
      stroke-opacity: 0.25;
      fill: url(#cardBg);
    }

    .project-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 18px;
      fill: #ffffff;
      letter-spacing: 2px;
    }

    .project-title-glow {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 18px;
      fill: #ffa500;
      letter-spacing: 2px;
      opacity: 0.8;
      filter: url(#goldGlow);
    }

    .project-subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      fill: #ffa500;
      letter-spacing: 1px;
    }

    .desc-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      fill: #a0aec0;
    }

    .badge-rect {
      fill: #1a202c;
      stroke: #718096;
      stroke-opacity: 0.3;
      stroke-dasharray: 4 2;
    }

    .badge-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      fill: #a0aec0;
      text-anchor: middle;
    }

    /* Globe orbit animations */
    .orbit {
      fill: none;
      stroke: #ffa500;
      stroke-width: 1;
      stroke-opacity: 0.2;
      transform-origin: 700px 100px;
    }

    .orbit-1 { animation: rotateOrbit 8s linear infinite; }
    .orbit-2 { animation: rotateOrbit 12s linear infinite reverse; }

    @keyframes rotateOrbit {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .pulse-pin {
      animation: pinPulse 2s infinite;
    }

    @keyframes pinPulse {
      0%, 100% { r: 3px; fill-opacity: 0.4; }
      50% { r: 6px; fill-opacity: 1; }
    }
  </style>

  <!-- Card Frame -->
  <rect class="card-border" x="15" y="15" width="800" height="170" rx="6" />

  <!-- Accent Tech Corner Elements -->
  <!-- Top Left -->
  <path d="M 15 35 L 15 15 L 35 15" fill="none" stroke="#ffa500" stroke-width="3" filter="url(#goldGlow)" />
  <!-- Bottom Right -->
  <path d="M 815 145 L 815 165 L 795 165" fill="none" stroke="#ffa500" stroke-width="3" filter="url(#goldGlow)" />

  <!-- Left: Content details -->
  <g transform="translate(45, 45)">
    <!-- Title with Glow -->
    <text x="0" y="5" class="project-title-glow">WANDERGLOW</text>
    <text x="0" y="5" class="project-title">WANDERGLOW</text>
    <text x="145" y="5" class="project-subtitle">[ AI TRAVEL ITINERARY PLANNER ]</text>

    <!-- Description -->
    <text x="0" y="32" class="desc-text">• Integrates OpenAI GPT-4o with advanced constraints for multi-day itineraries.</text>
    <text x="0" y="50" class="desc-text">• Secure FastAPI backend with JWT, MongoDB storage, and API query batching.</text>
    <text x="0" y="68" class="desc-text">• React UI with Zustand state caching and skeleton loading for &lt;2s perceived loads.</text>

    <!-- Badges -->
    <g transform="translate(0, 88)">
      <!-- React -->
      <rect class="badge-rect" x="0" y="0" width="60" height="18" rx="3" />
      <text class="badge-text" x="30" y="12">REACT</text>

      <!-- FastAPI -->
      <rect class="badge-rect" x="70" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="105" y="12">FASTAPI</text>

      <!-- GPT-4o -->
      <rect class="badge-rect" x="150" y="0" width="70" height="18" rx="3" />
      <text class="badge-text" x="185" y="12">GPT-4o</text>

      <!-- MongoDB -->
      <rect class="badge-rect" x="230" y="0" width="75" height="18" rx="3" />
      <text class="badge-text" x="267.5" y="12">MONGODB</text>

      <!-- Zustand -->
      <rect class="badge-rect" x="315" y="0" width="75" height="18" rx="3" />
      <text class="badge-text" x="352.5" y="12">ZUSTAND</text>
    </g>
  </g>

  <!-- Right Side: Travel Globe HUD visualizer -->
  <line x1="560" y1="30" x2="560" y2="170" stroke="#ffa500" stroke-opacity="0.1" stroke-dasharray="5 5" />

  <!-- Orbiting Globe Visual -->
  <g transform="translate(0, 0)">
    <!-- Base outline -->
    <circle cx="700" cy="100" r="45" fill="none" stroke="#ffa500" stroke-opacity="0.1" />
    <circle cx="700" cy="100" r="15" fill="none" stroke="#00f0ff" stroke-opacity="0.05" />

    <!-- Orbits -->
    <ellipse class="orbit orbit-1" cx="700" cy="100" rx="45" ry="18" stroke-dasharray="6 4" />
    <ellipse class="orbit orbit-2" cx="700" cy="100" rx="18" ry="45" stroke-dasharray="6 4" />
    <ellipse class="orbit orbit-1" cx="700" cy="100" rx="35" ry="35" stroke-dasharray="5 15" />

    <!-- Core pulse -->
    <circle cx="700" cy="100" r="6" fill="#ffa500" filter="url(#goldGlow)" />
    <!-- Dynamic flight nodes -->
    <circle class="pulse-pin" cx="665" cy="90" r="4" fill="#00f0ff" filter="url(#cyanGlow)" />
    <circle class="pulse-pin" cx="735" cy="110" r="4" fill="#ffa500" />
    <circle class="pulse-pin" cx="690" cy="135" r="4" fill="#00f0ff" />
  </g>
</svg>
