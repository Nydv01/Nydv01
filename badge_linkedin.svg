<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 50" width="250" height="50">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="btnBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#121214" />
    </linearGradient>

    <!-- Frosted Border Gradient -->
    <linearGradient id="frostBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c" />
      <stop offset="100%" stop-color="#242426" />
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&amp;display=swap');
    
    .btn-border {
      stroke: url(#frostBorder);
      stroke-width: 1;
      fill: url(#btnBg);
    }

    .btn-text-primary {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 11px;
      fill: #ffffff;
      letter-spacing: 1px;
    }

    .btn-text-secondary {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 10px;
      fill: #8e8e93;
    }

    .icon {
      fill: #c5a880; /* Apple Pro Gold */
    }
  </style>

  <!-- Button Frame -->
  <rect class="btn-border" x="1" y="1" width="248" height="48" rx="10" />

  <!-- LinkedIn Icon -->
  <path class="icon" d="M 23 18 L 43 18 C 45 18 47 20 47 22 L 47 42 C 47 44 45 46 43 46 L 23 46 C 21 46 19 44 19 42 L 19 22 C 19 20 21 18 23 18 Z M 27 22 C 25.3 22 24 23.3 24 25 C 24 26.7 25.3 28 27 28 C 28.7 28 30 26.7 30 25 C 30 23.3 28.7 22 27 22 Z M 24 30 L 30 30 L 30 42 L 24 42 Z M 32 30 L 38 30 L 38 32 C 39.5 30.5 41 30 43 30 C 45.5 30 47 31.5 47 34.5 L 47 42 L 41 42 L 41 35.5 C 41 34 40.5 33.5 39.5 33.5 C 38.5 33.5 38 34 38 35.5 L 38 42 L 32 42 Z" transform="scale(0.85) translate(4, 4)" />

  <!-- Texts -->
  <text x="60" y="22" class="btn-text-primary">LINKEDIN MATRIX</text>
  <text x="60" y="36" class="btn-text-secondary">linkedin.com/in/ydv-nitin</text>
</svg>
